<!-- Comment Input Form -->
<mat-card class="comment-input-card" [class.focused]="isFocused" [class.disabled]="disabled">
  
  <mat-card-content class="comment-input-content">
    
    <!-- Comment Form -->
    <form [formGroup]="commentForm" (ngSubmit)="onSubmit()" class="comment-form">
      
      <!-- Text Input Field -->
      <mat-form-field class="comment-field" appearance="outline">
        
        <mat-label>{{ placeholder }}</mat-label>
        
        <!-- Textarea -->
        <textarea 
          #textareaElement
          matInput
          formControlName="content"
          [placeholder]="getPlaceholderText()"
          [rows]="rows"
          [maxlength]="maxLength"
          class="comment-textarea"
          (focus)="onTextareaFocus()"
          (blur)="onTextareaBlur()"
          (keydown)="onKeyDown($event)"
          (paste)="onPaste($event)"
          (input)="autoResize()"
          cdkTextareaAutosize
          cdkAutosizeMinRows="3"
          cdkAutosizeMaxRows="8">
        </textarea>
        
        <!-- Character Counter -->
        <mat-hint *ngIf="showCharacterCount" 
                  class="character-counter"
                  [ngClass]="getCharacterCountClass()">
          {{ getCharacterCountText() }}
          <span *ngIf="getRemainingCharacters() < 100" class="remaining-hint">
            ({{ getRemainingCharacters() }} verbleibend)
          </span>
        </mat-hint>
        
        <!-- Error Messages -->
        <mat-error *ngIf="hasErrors()">
          {{ getErrorMessage() }}
        </mat-error>
        
      </mat-form-field>
      
    </form>
    
  </mat-card-content>
  
  <!-- Action Buttons -->
  <mat-card-actions *ngIf="showSubmitButton" class="comment-actions" [ngClass]="{ 'reply-mode': isInReplyMode() }">
    
    <!-- Action Buttons Container -->
    <div class="action-buttons">
      
      <!-- Keyboard Hint removed - now using tooltip on button -->
      
      <!-- 🚀 PHASE 4: Cancel Button for Reply Mode -->
      <button 
        *ngIf="showCancelButton && isInReplyMode()"
        mat-button
        type="button"
        class="cancel-button"
        [disabled]="isSubmitting"
        [matTooltip]="getCancelTooltip()"
        (click)="onCancel()">
        
        <mat-icon class="cancel-icon">close</mat-icon>
        <span class="button-text">Abbrechen</span>
        
      </button>
      
      <!-- Submit Button -->
      <button 
        mat-raised-button
        color="primary"
        type="button"
        class="submit-button"
        [disabled]="!isFormValid() || isSubmitting || disabled"
        [matTooltip]="getKeyboardHintTooltip()"
        matTooltipPosition="above"
        (click)="onSubmit()">
        
        <!-- Loading Spinner -->
        <mat-spinner *ngIf="isSubmitting" 
                     diameter="16" 
                     strokeWidth="2" 
                     class="button-spinner">
        </mat-spinner>
        
        <!-- Submit Icon -->
        <mat-icon *ngIf="!isSubmitting" class="submit-icon">
          {{ isInReplyMode() ? 'reply' : 'send' }}
        </mat-icon>
        
        <!-- Button Text -->
        <span class="button-text">
          {{ getSubmitButtonText() }}
        </span>
        
      </button>
      
    </div>
    
  </mat-card-actions>
  
  <!-- Status Bar removed for compact design -->
  
  <!-- Disabled State Overlay -->
  <div class="disabled-overlay" *ngIf="disabled">
    <div class="disabled-content">
      <mat-icon class="disabled-icon">block</mat-icon>
      <span class="disabled-text">Kommentare sind momentan nicht verfügbar</span>
    </div>
  </div>
  
</mat-card>
