name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-windows:
    name: Build Windows Installer
    needs: test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --x64 --publish=never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProTra-Helfer-Windows
          path: dist/*.exe
          retention-days: 30

  sign-windows:
    name: Sign Windows Installer (SignPath)
    needs: build-windows
    runs-on: ubuntu-latest
    if: vars.SIGNPATH_ORGANIZATION_ID != ''
    steps:
      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: ProTra-Helfer-Windows
          path: unsigned

      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: 'exe'
          github-artifact-id: ProTra-Helfer-Windows
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProTra-Helfer-Windows-Signed
          path: signed/*.exe
          retention-days: 30

  build-macos-x64:
    name: Build macOS Installer (x64)
    needs: test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS PKG (x64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --x64 --publish=never

      - name: Build macOS DMG (x64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --x64 --publish=never --config.mac.target=dmg

      - name: Upload macOS x64 PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProTra-Helfer-macOS-x64-PKG
          path: dist/*.pkg
          retention-days: 30

      - name: Upload macOS x64 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProTra-Helfer-macOS-x64-DMG
          path: dist/*.dmg
          retention-days: 30

  build-macos-arm64:
    name: Build macOS Installer (arm64)
    needs: test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS PKG (arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --arm64 --publish=never

      - name: Build macOS DMG (arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --arm64 --publish=never --config.mac.target=dmg

      - name: Upload macOS arm64 PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProTra-Helfer-macOS-arm64-PKG
          path: dist/*.pkg
          retention-days: 30

      - name: Upload macOS arm64 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProTra-Helfer-macOS-arm64-DMG
          path: dist/*.dmg
          retention-days: 30

  build-linux:
    name: Build Linux Packages
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --linux --publish=never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProTra-Helfer-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

  release:
    name: Create GitHub Release
    needs:
      - build-windows
      - build-macos-x64
      - build-macos-arm64
      - build-linux
    runs-on: ubuntu-latest
    # Don't require signing — it may not be configured yet
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Prefer signed Windows installer if available, otherwise use unsigned
      - name: Check for signed Windows artifact
        id: check-signed
        run: |
          if [ -d "artifacts/ProTra-Helfer-Windows-Signed" ] && [ "$(ls -A artifacts/ProTra-Helfer-Windows-Signed 2>/dev/null)" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect release assets
        run: |
          mkdir -p release
          if [ "${{ steps.check-signed.outputs.signed }}" = "true" ]; then
            cp artifacts/ProTra-Helfer-Windows-Signed/* release/
          else
            cp artifacts/ProTra-Helfer-Windows/* release/
          fi
          cp artifacts/ProTra-Helfer-macOS-x64-PKG/* release/ 2>/dev/null || true
          cp artifacts/ProTra-Helfer-macOS-x64-DMG/* release/ 2>/dev/null || true
          cp artifacts/ProTra-Helfer-macOS-arm64-PKG/* release/ 2>/dev/null || true
          cp artifacts/ProTra-Helfer-macOS-arm64-DMG/* release/ 2>/dev/null || true
          cp artifacts/ProTra-Helfer-Linux/* release/ 2>/dev/null || true

      - name: Generate SHA256 checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            See [Code Signing Policy](https://github.com/Timk46/ProTraHelper/blob/main/CODE_SIGNING_POLICY.md) for details on signing and privacy.

            **macOS:** Right-click the `.pkg` file → "Open" → confirm "Open" (required for unsigned builds).
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: Notify HEFL monorepo about new release
      - name: Notify HEFL Backend
        if: vars.HEFL_REPO != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HEFL_DISPATCH_TOKEN }}
          repository: ${{ vars.HEFL_REPO }}
          event-type: helper-app-release
          client-payload: '{"tag": "${{ github.ref_name }}"}'
