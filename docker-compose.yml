version: '3.1' 

services: 
# Postgres Database running in different compose

#ANGULAR
  goals_ofp_client:
    container_name: goals_ofp_client
    build: 
      context: .
      dockerfile: ./Docker/angular
      args:
        WEBSITE_URL: ${WEBSITE_URL}
        SERVER_URL: ${SERVER_URL}
        WEBSOCKET_URL: ${WEBSOCKET_URL} # Add this line
    networks:
      - nginx-network
    ports:
      - "80:80"
    restart: always

#NestJS
  goals_ofp_server:
    container_name: goals_ofp_server
    build: 
      context: .
      dockerfile: ./Docker/nest
    env_file:
      - .env
      - .env.auth.prod
    networks:
      - nginx-network
    restart: always
    ports:
      - "3000:3000"
      - "3100:3100"
    volumes:
    - ./files:/usr/src/files

networks:
  nginx-network:
    external: true