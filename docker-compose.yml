version: '3.1' 

services: 
# Postgres Database running in different compose

#ANGULAR
  hefl_aud_client:
    container_name: goals_aud_client
    build: 
      context: .
      dockerfile: ./Docker/angular
      args:
        WEBSITE_URL: ${WEBSITE_URL}
        SERVER_URL: ${SERVER_URL}
        WEBSOCKET_URL: ${WEBSOCKET_URL} # Add this line
    networks:
      - nginx-network
    restart: always

#NestJS
  hefl_aud_server:
    container_name: goals_aud_server
    build: 
      context: .
      dockerfile: ./Docker/nest
    env_file:
      - .env
      - .env.auth.prod
    networks:
      - nginx-network
    restart: always
    volumes:
    - ./files:/usr/src/files

networks:
  nginx-network:
    external: true