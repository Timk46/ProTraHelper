<div class="three-viewer-container">
  <!-- Loading spinner -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">3D-Modell wird geladen...</div>
  </div>

  <!-- Error message -->
  <div *ngIf="error" class="error-message">
    <mat-icon>error</mat-icon>
    <p>{{ error }}</p>
    <button mat-raised-button color="primary" (click)="reloadModel()">Erneut versuchen</button>
  </div>

  <!-- 3D renderer container -->
  <div #rendererContainer class="renderer-container"></div>

  <!-- Controls panel -->
  <div class="controls-panel">
    <div class="parameters-section">
      <h3>Parameter</h3>
      <div *ngFor="let param of parameters" class="parameter-control">
        <label>{{ param.name }}: {{ param.value.toFixed(1) }}</label>
        <mat-slider min="{{ param.min }}" max="{{ param.max }}" step="0.1">
          <input
            matSliderThumb
            [value]="param.value"
            (valueChange)="updateParameter(param.id, $event)"
          />
        </mat-slider>
      </div>
    </div>

    <div class="actions-section">
      <button mat-raised-button (click)="toggleAnalysisMode()">
        <mat-icon>{{ isAnalysisMode ? 'visibility_off' : 'visibility' }}</mat-icon>
        {{ isAnalysisMode ? 'Analyse ausblenden' : 'Analyse anzeigen' }}
      </button>
      <button mat-raised-button (click)="resetParameters()">
        <mat-icon>refresh</mat-icon>
        Parameter zurücksetzen
      </button>
      <button mat-raised-button (click)="resetCamera()">
        <mat-icon>home</mat-icon>
        Kamera zurücksetzen
      </button>
    </div>
  </div>
</div>
