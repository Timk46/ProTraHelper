<div class="course-pmpm-integration">
  <mat-card>
    <mat-card-header>
      <mat-card-title>3D-Modellanalyse</mat-card-title>
      <mat-card-subtitle>Interaktive Analyse und Bearbeitung von Modellen</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Model selection -->
      <div class="model-selection">
        <h3>Verfügbare Modelle</h3>
        <div class="model-list">
          <button
            mat-stroked-button
            *ngFor="let model of availableModels"
            [class.selected]="selectedModel === model.id"
            (click)="changeModel(model.id)"
          >
            {{ model.name }}
          </button>
        </div>
      </div>

      <!-- Model viewer -->
      <div class="model-viewer">
        <div *ngIf="isLoading" class="loading-indicator">
          <p>Modell wird geladen...</p>
        </div>

        <div *ngIf="error" class="error-message">
          <p>Fehler beim Laden des Modells: {{ error }}</p>
        </div>

        <app-three-viewer
          *ngIf="!isLoading && !error"
          [modelId]="selectedModel"
          [modelPath]="modelPath"
        >
        </app-three-viewer>
      </div>

      <!-- Model description -->
      <div class="model-description" *ngIf="selectedModel">
        <h4>Beschreibung</h4>
        <p>
          {{ getSelectedModelDescription() }}
        </p>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="openPmpmEditor()">
        <mat-icon>fullscreen</mat-icon>
        In PMPM öffnen
      </button>

      <ng-container *ngIf="taskType === 'edit'">
        <button mat-raised-button color="accent">
          <mat-icon>save</mat-icon>
          Änderungen speichern
        </button>
      </ng-container>

      <ng-container *ngIf="taskType === 'review'">
        <button mat-raised-button color="accent" (click)="openPeerReview()">
          <mat-icon>rate_review</mat-icon>
          Peer-Review durchführen
        </button>
      </ng-container>
    </mat-card-actions>
  </mat-card>
</div>
