<mat-toolbar class="app-header">
  <!-- Linke Seite: Logo und Titel -->
  <div class="left-content">
    <span class="app-title">HEFL</span>
  </div>

  <!-- Mitte: Navigation Toggle Button (Mobile/Graph) -->
  <div class="center-content">
    <app-navigation-preference-toggle *ngIf="showNavToggle" class="nav-toggle"></app-navigation-preference-toggle>
  </div>

  <!-- Rechte Seite: Notification und User-Menü -->
  <div class="right-content">
    <!-- Notification Bell -->

    <!-- User Menü -->
    <button mat-button [matMenuTriggerFor]="userMenu" *ngIf="userIsLoggedIn" class="user-menu-button">
      <mat-icon>account_circle</mat-icon>
      <span class="username">{{ userMail }}</span>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="logOut(false)">Abmelden</button>
      <button mat-menu-item (click)="logOut(true)">Von allen Geräten abmelden</button>
    </mat-menu>
    <div *ngIf="userIsLoggedIn" class="notification-container">
      <app-notification-bell></app-notification-bell>
    </div>
  </div>
</mat-toolbar>
