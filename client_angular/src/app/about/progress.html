<h2 mat-dialog-title>Fortschritt</h2>
<mat-dialog-content class="mat-typography">
  <p>Hier sehen Sie Ihren aktuellen Fortschritt. <b>Diese Angaben sind noch ohne Gewähr</b>, da vereinzelt neue Aufgaben hinzugefügt werden.</p> <p>Verlässliche Informationen zum Fortschritt erhalten Sie in den kommenden Wochen.</p>
  <p>Ihr aktueller Fortschritt beträgt: <b>{{userTotalProgress | number:'1.2-2'}}%</b></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Okay</button>
<!--  <button mat-button [mat-dialog-close]="true" cdkFocusInitial>Install</button>-->
</mat-dialog-actions>
