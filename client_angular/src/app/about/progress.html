<h2 mat-dialog-title>Prüfungsvorleistung</h2>
<mat-dialog-content class="mat-typography">
  <p>Die Studienleistung wurde bereits verbucht. GOALS dient daher in diesem Semester nur noch der freiwilligen Klausurvorbereitung.</p>
  <p>Ihr aktueller Fortschritt beträgt: <b>{{userTotalProgress | number:'1.2-2'}}%</b></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Okay</button>
<!--  <button mat-button [mat-dialog-close]="true" cdkFocusInitial>Install</button>-->
</mat-dialog-actions>
