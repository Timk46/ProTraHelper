<div class="student-workspace">

  <!-- Mobile Navigation für Tab-basiertes Layout (oben statt unten) -->
  <div class="mobile-navigation">
    <button
      mat-button
      [class.active]="activeTab === 'task'"
      (click)="setActiveTab('task')">
      Aufgabe
    </button>
    <button
      mat-button
      [class.active]="activeTab === 'code'"
      (click)="setActiveTab('code')">
      Code
    </button>
    <button
      mat-button
      [class.active]="activeTab === 'output'"
      (click)="setActiveTab('output')">
      Ausgabe
    </button>
    <button
      mat-button
      [class.active]="activeTab === 'feedback'"
      (click)="setActiveTab('feedback')">
      Feedback
    </button>
  </div>

  <!-- Neue Workspace-Container-Struktur -->
  <div class="workspace-container" [attr.data-active-tab]="activeTab">
    <!-- Obere Zeile: Aufgabe + Editor -->
    <div class="top-row" [style.height.%]="topRowHeight">
      <div class="task-panel" [style.width.%]="taskPanelWidth">
        <div class="panel-header">
          <h2>Aufgabenbeschreibung</h2>
          <button
            mat-icon-button
            class="toggle-button"
            (click)="toggleTaskPanel()"
            aria-label="Aufgabenbeschreibung ein-/ausklappen">
            <mat-icon>{{ isTaskPanelCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
          </button>
        </div>
        <div class="task-description" [innerHTML]="taskDescription"></div>
      </div>

      <!-- Horizontaler Resize-Handle -->
      <!-- <div class="horizontal-resize-handle" (mousedown)="startHorizontalResize($event)"></div> -->

      <div class="editor-section" [style.width.%]="100 - taskPanelWidth">
        <app-code-editor-wrapper
          [currentTask]="workspaceState.getCurrentTask()"
          (executionStarted)="onCodeExecutionStart()"
          (codeSubmitted)="onCodeSubmitted($event)">
        </app-code-editor-wrapper>
      </div>
    </div>

    <!-- Vertikaler Resize-Handle zwischen Top und Middle -->
    <div class="vertical-resize-handle" (mousedown)="startVerticalResizeTop($event)"></div>

    <!-- Mittlere Zeile: Test-Indikatoren + Execute-Button -->
    <div class="middle-row" [style.height.px]="middleRowHeight">
      <!-- Verbesserte Struktur für die mittlere Zeile -->
      <div class="middle-row-content">
        <!-- Test-Indikatoren anzeigen -->
        <div class="test-indicators-container" [class.empty]="!testResults || testResults.length === 0">
          <app-test-indicators
            *ngIf="testResults && testResults.length > 0"
            [testResults]="testResults">
          </app-test-indicators>
          <span *ngIf="!testResults || testResults.length === 0" class="no-tests-message">
            Führe den Code aus, um die Tests zu starten
          </span>
        </div>

        <!-- Execute-Button mit verbessertem Styling -->
        <div class="execute-button-container">
          <button
            mat-raised-button
            (click)="executeCode()"
            [disabled]="isCompiling || !workspaceState.getCurrentTask()">
            <mat-icon>play_arrow</mat-icon>
            Code ausführen
          </button>
        </div>
      </div>

      <!-- Statusindikator für Ausführung -->
      <div class="compile-status" [class.active]="isCompiling"></div>
    </div>

    <!-- Vertikaler Resize-Handle zwischen Middle und Bottom -->
    <!-- Vertikaler<div class="vertical-resize-handle" (mousedown)="startVerticalResizeBottom($event)"></div>-->

    <!-- Untere Zeile: Feedback + Terminal -->
    <div class="bottom-row" [style.height.%]="bottomRowHeight">
      <div class="feedback-area" [style.width.%]="feedbackAreaWidth">
        <app-feedback-panel></app-feedback-panel>
      </div>

      <!-- Horizontaler Resize-Handle -->
      <!-- <div class="horizontal-resize-handle" (mousedown)="startHorizontalResizeBottom($event)"></div>-->

      <div class="terminal-section" [style.width.%]="100 - feedbackAreaWidth">
        <app-terminal-output
          [output]="compilerOutput"
          [isLoading]="isCompiling">
        </app-terminal-output>
      </div>
    </div>
  </div>
</div>
