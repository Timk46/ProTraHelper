<div class="feedback-panel">
  <!-- Einführung / Leerer Zustand -->
  <div *ngIf="!showFeedbackOptions() && !feedbackContent && !isGenerating" class="feedback-intro">
    <div class="feedback-card">
      <p class="compact-message">Führe deinen Code aus, um Feedback zu erhalten.</p>
    </div>
  </div>

  <!-- Kompakte Feedback-Optionen -->
  <div *ngIf="showFeedbackOptions()" class="feedback-options">
    <div class="feedback-card">
      <p class="compact-title">Wähle Feedback-Option:</p>

      <!-- Compact Agent Buttons -->
      <div class="compact-agent-buttons">
        <button class="compact-button supervisor" mat-stroked-button (click)="requestSupervisorFeedback()" matTooltip="Die KI entscheidet die beste Option für dich">
          <mat-icon>supervisor_account</mat-icon>
          <span>KI wählen</span>
        </button>

        <button class="compact-button concepts" mat-stroked-button (click)="requestKcFeedback()" matTooltip="Relevantes Hintergrundwissen erklären">
          <mat-icon>lightbulb</mat-icon>
          <span>Konzepte</span>
        </button>

        <button class="compact-button next-steps" mat-stroked-button (click)="requestKhFeedback()" matTooltip="Zeigt, wie du weitermachen kannst">
          <mat-icon>navigation</mat-icon>
          <span>Nächste Schritte</span>
        </button>

        <button class="compact-button errors" mat-stroked-button (click)="requestKmFeedback()" matTooltip="Probleme in deinem Code erkennen">
          <mat-icon>bug_report</mat-icon>
          <span>Fehler</span>
        </button>

        <button class="compact-button task" mat-stroked-button (click)="requestKtcFeedback()" matTooltip="Erklärung der Aufgabenstellung">
          <mat-icon>assignment</mat-icon>
          <span>Aufgabe</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Feedback-Generierung und Anzeige -->
  <div *ngIf="isGenerating || feedbackContent" class="feedback-content">
    <!-- Ladeanimation -->
    <div *ngIf="isGenerating" class="loading-container">
      <div class="spinner-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
      <p class="generating-message">{{ generatingMessage }}</p>
    </div>

    <!-- Feedback-Text und Rating -->
    <div *ngIf="feedbackContent" class="feedback-result">
      <div class="feedback-header">
        <h3>Feedback zu deinem Code</h3>
        <!-- Removed old feedback type badge -->
      </div>

      <div class="feedback-text" [innerHTML]="sanitizedFeedback"></div>

      <div *ngIf="showRating()" class="rating-section">
        <div class="rating-divider"></div>
        <app-rating (ratingSubmitted)="onRatingSubmitted($event)"></app-rating>
      </div>
    </div>
  </div>
</div>
