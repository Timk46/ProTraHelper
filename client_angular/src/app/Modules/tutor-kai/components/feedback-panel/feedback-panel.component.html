<div class="feedback-panel">
  <!-- Einführung / Leerer Zustand -->
  <div *ngIf="!showFeedbackOptions() && !feedbackContent && !isGenerating" class="feedback-intro">
    <div class="feedback-card">
      <p>Führe zunächst deinen Code aus, um Feedback von Tutor Kai zu erhalten.</p>
    </div>
  </div>

  <!-- Neue Feedback-Optionen zur Auswahl -->
  <div *ngIf="showFeedbackOptions()" class="feedback-options">
    <div class="feedback-card">
      <p>Wähle die Art des Feedbacks, das du erhalten möchtest:</p>

      <!-- New Agent Buttons -->
      <div class="agent-buttons">
        <button mat-stroked-button color="primary" (click)="requestSupervisorFeedback()">
          <mat-icon>supervisor_account</mat-icon> Supervisor Feedback
        </button>
        <button mat-stroked-button color="primary" (click)="requestKcFeedback()">
          <mat-icon>lightbulb</mat-icon> KC Feedback (Concepts)
        </button>
        <button mat-stroked-button color="primary" (click)="requestKhFeedback()">
          <mat-icon>navigation</mat-icon> KH Feedback (How-To)
        </button>
        <button mat-stroked-button color="primary" (click)="requestKmFeedback()">
          <mat-icon>bug_report</mat-icon> KM Feedback (Mistakes)
        </button>
        <button mat-stroked-button color="primary" (click)="requestKtcFeedback()">
          <mat-icon>assignment</mat-icon> KTC Feedback (Task)
        </button>
      </div>
    </div>
  </div>

  <!-- Feedback-Generierung und Anzeige -->
  <div *ngIf="isGenerating || feedbackContent" class="feedback-content">
    <!-- Ladeanimation -->
    <div *ngIf="isGenerating" class="loading-container">
      <div class="spinner-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
      <p class="generating-message">{{ generatingMessage }}</p>
    </div>

    <!-- Feedback-Text und Rating -->
    <div *ngIf="feedbackContent" class="feedback-result">
      <div class="feedback-header">
        <h3>Feedback zu deinem Code</h3>
        <!-- Removed old feedback type badge -->
      </div>

      <div class="feedback-text" [innerHTML]="sanitizedFeedback"></div>

      <div *ngIf="showRating()" class="rating-section">
        <div class="rating-divider"></div>
        <app-rating (ratingSubmitted)="onRatingSubmitted($event)"></app-rating>
      </div>
    </div>
  </div>
</div>
