<div class="feedback-panel">
  <!-- Einführung / Leerer Zustand -->
  <div *ngIf="!showFeedbackOptions() && !feedbackContent && !isGenerating" class="feedback-intro">
    <div class="feedback-card">
      <p>Führe zunächst deinen Code aus, um Feedback von Tutor Kai zu erhalten.</p>
    </div>
  </div>

  <!-- Neue Feedback-Optionen zur Auswahl -->
  <div *ngIf="showFeedbackOptions()" class="feedback-options">
    <div class="feedback-card">
      <p>Wähle die Art des Feedbacks, das du erhalten möchtest:</p>
      
      <!-- Kategorie-Buttons -->
      <div class="category-buttons">
        <button
          *ngFor="let category of feedbackCategories"
          mat-stroked-button
          color="primary"
          [class.selected]="selectedCategory === category"
          (click)="selectCategory(category)">
          <span class="category-icon">{{ category.icon }}</span>
          <span class="category-keyword">{{ category.keyword }}</span>
        </button>
      </div>
      
      <!-- Sprechblase mit Fragen -->
      <div
        *ngIf="selectedCategory"
        class="question-bubble">
        <div class="bubble-arrow"></div>
        <div class="bubble-content">
          <h4>{{ selectedCategory.name }}</h4>
          <div class="question-list">
            <button
              *ngFor="let question of selectedCategory.questions"
              mat-button
              color="primary"
              class="question-button"
              (click)="requestFeedbackForQuestion(question)">
              {{ question.text }}
            </button>
          </div>
        </div>
      </div>
      
      <!-- Overlay zum Schließen der Sprechblase bei Klick außerhalb -->
      <div
        *ngIf="selectedCategory"
        class="bubble-overlay"
        (click)="closeQuestionBubble()">
      </div>
    </div>
  </div>

  <!-- Feedback-Generierung und Anzeige -->
  <div *ngIf="isGenerating || feedbackContent" class="feedback-content">
    <!-- Ladeanimation -->
    <div *ngIf="isGenerating" class="loading-container">
      <div class="spinner-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
      <p class="generating-message">{{ generatingMessage }}</p>
    </div>

    <!-- Feedback-Text und Rating -->
    <div *ngIf="feedbackContent" class="feedback-result">
      <div class="feedback-header">
        <h3>Feedback zu deinem Code</h3>
        <div *ngIf="selectedQuestion && selectedCategory" class="feedback-type-badge">
          <span class="category-icon">{{ selectedCategory.icon }}</span>
          <span class="question-text">{{ selectedQuestion.text }}</span>
        </div>
      </div>

      <div class="feedback-text" [innerHTML]="sanitizedFeedback"></div>

      <div *ngIf="showRating()" class="rating-section">
        <div class="rating-divider"></div>
        <app-rating (ratingSubmitted)="onRatingSubmitted($event)"></app-rating>
      </div>
    </div>
  </div>
</div>
