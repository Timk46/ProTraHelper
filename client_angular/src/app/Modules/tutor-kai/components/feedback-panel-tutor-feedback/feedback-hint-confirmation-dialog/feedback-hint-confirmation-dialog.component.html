<div class="feedback-hint-dialog">
  <div class="dialog-header">
    <h2 mat-dialog-title>Hinweis</h2>
  </div>

  <mat-dialog-content>
    <p class="warning-message">
      Vorsicht, hier werden schon die nächsten Schritte verraten. Möchten Sie das?
    </p>
  </mat-dialog-content>

  <mat-dialog-actions>

    <button
      mat-flat-button
      class="confirm-button"
      (click)="confirm()">
      Ja, ich brauche weitere Informationen
    </button>

    <button
    mat-flat-button
    class="cancel-button"
    (click)="cancel()">
    Nein, vielleicht finde ich die Informationen noch
  </button>
  </mat-dialog-actions>
</div>
