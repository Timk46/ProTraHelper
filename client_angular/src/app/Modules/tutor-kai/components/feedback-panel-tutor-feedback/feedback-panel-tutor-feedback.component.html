<div class="feedback-panel-tutor">
  <div class="feedback-header">
    <h2>Tutor Kai</h2>
    <p class="ai-warning">Das Feedback wird mittels generativer KI generiert und ist nicht immer perfekt.</p>
  </div>
  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Loading structured feedback...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !isLoading" class="error-container">
    <mat-icon color="warn">error_outline</mat-icon>
    <p>Error loading feedback:</p>
    <p class="error-message">{{ error }}</p>
    <!-- Optional: Add a retry button -->
    <!-- <button mat-stroked-button color="warn" (click)="fetchFeedback()">Retry</button> -->
  </div>

  <!-- Feedback Content -->
  <div *ngIf="feedback && !isLoading && !error" class="feedback-content">
    <div class="feedback-cards">


      <!-- KM Feedback Card -->
      <div *ngIf="feedback['KM']" class="feedback-card" [class.expanded]="expandedSections['KM']">
        <button class="card-header" (click)="toggleSection('KM')" [disabled]="expandedSections['KM']">
          <span class="title">{{ feedbackTitles['KM'] || 'KM' }}</span>
          <mat-icon *ngIf="!expandedSections['KM']">visibility</mat-icon>
          <mat-icon *ngIf="expandedSections['KM']" class="visible-icon">visibility</mat-icon>
        </button>
        <div class="card-content" [@expandCollapse]="expandedSections['KM'] ? 'true' : 'false'">
          <div class="feedback-text" [innerHTML]="parseMarkdown(feedback['KM'])"></div>
        </div>
      </div>

      <!-- KC Feedback Card -->
      <div *ngIf="feedback['KC']" class="feedback-card" [class.expanded]="expandedSections['KC']">
        <button class="card-header" (click)="toggleSection('KC')" [disabled]="expandedSections['KC']">
          <span class="title">{{ feedbackTitles['KC'] || 'KC' }}</span>
          <mat-icon *ngIf="!expandedSections['KC']">visibility</mat-icon>
          <mat-icon *ngIf="expandedSections['KC']" class="visible-icon">visibility</mat-icon>
        </button>
        <div class="card-content" [@expandCollapse]="expandedSections['KC'] ? 'true' : 'false'">
          <div class="feedback-text" [innerHTML]="parseMarkdown(feedback['KC'])"></div>
        </div>
      </div>

      <!-- KH Feedback Card -->
      <div *ngIf="feedback['KH']" class="feedback-card" [class.expanded]="expandedSections['KH']">
        <button class="card-header" (click)="toggleSection('KH')" [disabled]="expandedSections['KH']">
          <span class="title">{{ feedbackTitles['KH'] || 'KH' }}</span>
          <mat-icon *ngIf="!expandedSections['KH']">visibility</mat-icon>
          <mat-icon *ngIf="expandedSections['KH']" class="visible-icon">visibility</mat-icon>
        </button>
        <div class="card-content" [@expandCollapse]="expandedSections['KH'] ? 'true' : 'false'">
          <div class="feedback-text" [innerHTML]="parseMarkdown(feedback['KH'])"></div>
        </div>
      </div>
    </div>

    <!-- SPS Feedback Card -->
    <div *ngIf="feedback['SPS']" class="feedback-card" [class.expanded]="expandedSections['SPS']">
      <button class="card-header" (click)="toggleSection('SPS')" [disabled]="expandedSections['SPS']">
        <span class="title">{{ feedbackTitles['SPS'] || 'SPS' }}</span>
        <mat-icon *ngIf="!expandedSections['SPS']">visibility</mat-icon>
        <mat-icon *ngIf="expandedSections['SPS']" class="visible-icon">visibility</mat-icon>
      </button>
      <div class="card-content" [@expandCollapse]="expandedSections['SPS'] ? 'true' : 'false'">
        <markdown [data]="feedback['SPS']"></markdown>
      </div>
    </div>

    <!-- Rating Section
    <div *ngIf="showRating()" class="rating-section">
      <div class="rating-divider"></div>
      <app-rating (ratingSubmitted)="onRatingSubmitted($event)"></app-rating>
    </div>
  </div>-->

  <!-- Initial state / No feedback yet (Optional)
  <div *ngIf="!feedback && !isLoading && !error" class="initial-state">
  </div> -->

</div>
