<div class="terminal-container">
  <div class="terminal-header">
    <h2>Compiler Output</h2>
    <div class="header-buttons">
      <!-- Schriftgröße verkleinern -->
      <button
        mat-icon-button
        class="font-size-button"
        (click)="decreaseFontSize()"
        aria-label="Schriftgröße verkleinern"
        [disabled]="fontSizePercent <= MIN_FONT_SIZE"
      >
        <mat-icon>text_decrease</mat-icon>
      </button>

      <!-- Schriftgröße vergrößern -->
      <button
        mat-icon-button
        class="font-size-button"
        (click)="increaseFontSize()"
        aria-label="Schriftgröße vergrößern"
        [disabled]="fontSizePercent >= MAX_FONT_SIZE"
      >
        <mat-icon>text_increase</mat-icon>
      </button>

      <!-- Bestehender Kopier-Button -->
      <button
        mat-icon-button
        class="copy-button"
        (click)="copyOutput()"
        aria-label="Inhalt kopieren"
      >
        <mat-icon>content_copy</mat-icon>
      </button>
    </div>
  </div>

  <div class="terminal-body">
    <div *ngIf="isLoading" class="loading-spinner">
      <div class="spinner"></div>
      <span>Ausführung läuft...</span>
    </div>

    <div *ngIf="!isLoading" class="terminal-content" [style.fontSize.%]="fontSizePercent">
      <p *ngFor="let line of formattedOutput" [innerHTML]="line"></p>
      <div *ngIf="formattedOutput.length === 0" class="empty-message">Keine Ausgabe vorhanden</div>
    </div>
  </div>
</div>
