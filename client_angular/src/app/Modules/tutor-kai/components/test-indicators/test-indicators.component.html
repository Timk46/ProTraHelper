<div class="test-indicators-container" *ngIf="testResults && testResults.length > 0" [class.active]="isNewResult">
  <div class="test-indicators">
    <div
      *ngFor="let test of testResults; let i = index"
      class="test-indicator"
      [class.passed]="test.passed"
      [class.failed]="!test.passed"
      [class.new-result]="isNewResult"
      [matTooltip]="getDetailedTooltip(test)"
      (click)="openTestDetails(test)">
      {{ i+1 }}
    </div>
  </div>

  <div class="test-summary" [ngClass]="getSummaryClass()">
    {{ getTestSummary() }}
  </div>
</div>

<div class="test-indicators-container empty" *ngIf="!testResults || testResults.length === 0">
  <div class="test-summary">Keine Tests verfügbar</div>
</div>
