<mat-toolbar class="header" style="min-height: 30px !important; height: 30px !important;" color="primary">
  <div class="left-content">
    <a mat-list-item routerLink="/dashboard" style="cursor: pointer;" routerLinkActive="active-link">
      <span style="font-size:15px;">Zurück zum Dashboard</span>
    </a>
  </div>

  <div class="center-content">
    <span style="font-size:15px;">GOALS: Code-Game</span>
  </div>

  <div class="right-content"></div>
</mat-toolbar>

<div class="w-full px-4">
  <div class="w-full mx-auto my-4">
    <div class="workspace">
      <div class="task-description">
        <mat-card>
          <mat-card-content class="polarNight_4_text">
            <markdown [data]="taskDescription"></markdown>
          </mat-card-content>
        </mat-card>
      </div>

      <div class="bottom-row">
        <div class="playfield-column">
          <mat-card>
<!--            TODO: if task is loaded, show the playfield-->
            <mat-card-content>
              <app-playfield #playfield (gameAnimationFinished)="onGameAnimationFinished($event)">
              </app-playfield>
            </mat-card-content>
          </mat-card>
        </div>

        <div class="code-editor-column">
          <mat-card>
            <mat-card-content>
              <mat-tab-group dynamicHeight animationDuration="0ms" [backgroundColor]="'primary'" [color]="'primary'">
                <mat-tab *ngFor="let codeStructure of currentTask?.codeGameQuestion?.codeGameScaffolds; let isLast = last">
                  <ng-template mat-tab-label>
                    <div class="tab-label">
                      <span>{{codeStructure.codeFileName}}</span>
                    </div>
                  </ng-template>
                  <app-code-editor-code-game #codeEditorMonaco
                                     [selectedLanguage]="currentTask?.codeGameQuestion?.programmingLanguage"
                                     [(code)]="codeStructure.code"
                                     (codeChange)="onCodeChanged($event)">
                  </app-code-editor-code-game>
                </mat-tab>
              </mat-tab-group>
            </mat-card-content>
          </mat-card>
        </div>
      </div>
    </div>

    <div class="run">
      <div class="success-informations">
        <div *ngIf="isGameAnimationFinished" class="flex items-center md:w-auto mr-2">
          <svg width="24" height="24">
            <circle cx="12" cy="12" r="10" [attr.fill]="reachedDestination ? '#4caf50' : '#f44336'"></circle>
          </svg>
          <span class="polarNight_4_text ml-1">Ziel erreicht</span>
        </div>
        <div *ngIf="isGameAnimationFinished && rocksInGame" class="flex items-center md:w-auto ml-2">
          <svg width="24" height="24">
            <circle cx="12" cy="12" r="10" [attr.fill]="collectedAllRocks ? '#4caf50' : '#f44336'"></circle>
          </svg>
          <span class="polarNight_4_text ml-1">Gestein gesammelt</span>
        </div>
      </div>

      <div class="game-actions">
        <button
          mat-raised-button color="primary" (click)="submitCode()"
          [disabled]="submitButtonIsDisabled"
          class="md:w-auto mb-2 px-4 noOverFlow mr-5">Ausführen
        </button>

        <button
          mat-raised-button color="primary" (click)="resetGame()"
          [disabled]="resetButtonIsDisabled"
          class="md:w-auto mb-2 px-4 noOverFlow ml-5">Zurücksetzen
        </button>
      </div>

      <div class="save">
      </div>
    </div>

    <div *ngIf="isLoading" class="flex justify-center items-center min-h-32">
      <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
    </div>

    <div *ngIf="!isLoading && showCompilerOutput" class="result">
      <mat-card>
        <mat-card-header>
          <mat-card-subtitle class="polarNight_4_text">Ausgabe</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
          <pre class="polarNight_4_text break-words whitespace-pre-wrap text-xs md:text-base">{{ compilerConsoleOutputView }}</pre>
          <mat-divider></mat-divider>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
