<div class="dialog-container">

    <!-- Video Selection -->
    <div class="video-selection-container">
      <div class="video-selection-title">
        <h2>Tutorial Videos</h2>
        <div class="bottem-border"></div>
      </div>
      <div class="video-selection">

        <!-- List - Tutorial Videos -->
        <div 
          *ngFor="let tutorial of tutorials; let i = index"
          [ngClass]="currentTutorial === i ? 'video-selection-item selected' : 'video-selection-item'"
          (click)="currentTutorial = i"
        >
          <h4>{{tutorial.title}}</h4>
        </div>
        
      </div>
    </div>

    <!--VIDEO-->
    <div class= "video-container">
      <video #videoPlayer [src]="tutorials[currentTutorial].videoUrl" controls width="100%" height="100%">
        Ihr Browser unterstützt das Video-Tag nicht.
      </video>
    </div>     

</div>
