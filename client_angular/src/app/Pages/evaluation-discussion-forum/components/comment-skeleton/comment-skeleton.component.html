<!-- Comment Skeleton Loading Container -->
<div [class]="getResponsiveSkeletonClass()" 
     role="status" 
     aria-label="Loading comments..."
     aria-live="polite">

  <!-- Skeleton Items -->
  <div *ngFor="let item of skeletonItems; trackBy: trackBySkeletonItem; let i = index"
       [class]="getSkeletonItemClass(item)"
       [style]="getIndentationStyle(item.depth)"
       [attr.data-skeleton-index]="i">

    <!-- Discussion Header Skeleton -->
    <mat-card *ngIf="item.type === 'header'" 
              class="skeleton-header-card"
              [style]="getAnimationStyle(item)">
      <div class="skeleton-header-content">
        <div class="skeleton-line skeleton-header-title"></div>
        <div class="skeleton-line skeleton-header-subtitle"></div>
      </div>
    </mat-card>

    <!-- Comment Skeleton -->
    <mat-card *ngIf="item.type === 'comment'" 
              class="skeleton-comment-card"
              [style]="getAnimationStyle(item)">
      
      <!-- Comment Header -->
      <div class="skeleton-comment-header">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-meta">
          <div class="skeleton-line skeleton-author"></div>
          <div class="skeleton-line skeleton-timestamp"></div>
        </div>
        
        <!-- Vote Buttons Skeleton -->
        <div *ngIf="showVoteButtons" class="skeleton-vote-section">
          <div class="skeleton-vote-button skeleton-upvote"></div>
          <div class="skeleton-vote-count"></div>
          <div class="skeleton-vote-button skeleton-downvote"></div>
        </div>
      </div>

      <!-- Comment Content -->
      <div class="skeleton-comment-content">
        <div *ngFor="let lineIndex of getContentLines(item.contentLines); trackBy: trackByLineIndex"
             [class]="getContentLineClass(lineIndex)">
        </div>
      </div>

      <!-- Comment Actions -->
      <div class="skeleton-comment-actions">
        <div class="skeleton-action-button"></div>
        <div class="skeleton-action-button" *ngIf="item.hasReplies"></div>
        <div class="skeleton-reply-count" *ngIf="item.hasReplies"></div>
      </div>
      
    </mat-card>
  </div>

  <!-- Loading Text for Screen Readers -->
  <div class="sr-only" aria-live="polite">
    Loading {{ count }} comments...
  </div>
</div>

<!-- Mobile-Optimized Skeleton (Responsive) -->
<div class="skeleton-mobile-notice" *ngIf="false">
  <div class="skeleton-line skeleton-mobile-text"></div>
</div>
