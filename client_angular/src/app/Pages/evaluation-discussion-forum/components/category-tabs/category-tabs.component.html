<!-- Category Tabs Container -->
<div class="category-tabs-container">
  <!-- Tab buttons matching the design -->
  <div class="criteria-tabs">
    <button
      *ngFor="let category of categories; trackBy: trackByCategory"
      class="criteria-tab"
      [class.active]="isActiveCategory(category.id)"
      [class.loading-disabled]="disabled"
      [disabled]="disabled"
      (click)="onTabChanged(category.id)"
      [attr.aria-disabled]="disabled"
      [style.cursor]="disabled ? 'wait' : 'pointer'">
      {{ category.displayName }}
      <!-- Loading indicator for active tab during transition -->
      <mat-spinner
        *ngIf="disabled && isActiveCategory(category.id)"
        diameter="16"
        class="inline-spinner">
      </mat-spinner>
    </button>
  </div>
</div>

<!-- Loading State -->
<div class="loading-state" *ngIf="categories.length === 0">
  <mat-spinner diameter="20"></mat-spinner>
  <span>Lade Kategorien...</span>
</div>
