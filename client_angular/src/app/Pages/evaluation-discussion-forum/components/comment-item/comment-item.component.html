<!-- Comment Block (matching chatrichtig.png design) - 🚀 PHASE 4: Enhanced with comprehensive ARIA labels -->
<div class="comment-block" 
     [ngClass]="cachedIsCurrentUser ? 'own-comment' : 'other-comment'"
     role="article"
     [attr.aria-label]="'Comment by ' + cachedAuthorDisplayName + ' posted ' + formattedTime"
     [attr.aria-describedby]="'comment-content-' + comment.id"
     [attr.data-comment-id]="comment.id">
  <!-- Message Header -->
  <div class="message-header" role="banner">
    <!-- Author Name (left) - cached for performance -->
    <span class="author-name" 
          role="text"
          [attr.aria-label]="'Author: ' + cachedAuthorDisplayName + (cachedIsCurrentUser ? ' (you)' : '')"
          [attr.data-author-id]="comment.author.id">
      {{ cachedAuthorDisplayName }}
    </span>

    <!-- Timestamp (right) -->
    <span class="message-time" 
          [matTooltip]="comment.createdAt | date: 'medium' : 'de-DE'"
          role="text"
          [attr.aria-label]="'Posted ' + formattedTime + ' on ' + (comment.createdAt | date: 'medium')">
      {{ formattedTime }}
    </span>
  </div>

  <!-- Message Content -->
  <div class="message-content" role="main">
    <!-- 🚀 PHASE 4: Enhanced with proper ARIA attributes for content accessibility -->
    <div
      class="message-text"
      [innerHTML]="cachedFormattedContent"
      [attr.id]="'comment-content-' + comment.id"
      role="text"
      [attr.aria-label]="'Comment content: ' + comment.content.substring(0, 100) + (comment.content.length > 100 ? '... and more' : '')"
      [attr.data-content-length]="comment.content.length">
    </div>
  </div>

  <!-- Voting Actions and Panel Controls -->
  <div class="vote-actions"
       role="toolbar"
       [attr.aria-label]="'Comment actions for comment by ' + cachedAuthorDisplayName"
       [attr.aria-controls]="'comment-content-' + comment.id">
    <!-- 🚨 STATE 1: User can vote (ownership confirmed as false) -->
    <div *ngIf="depth === 0 && cachedIsCurrentUser === false" 
         class="vote-controls"
         role="group"
         [attr.aria-label]="'Vote controls for comment by ' + cachedAuthorDisplayName">
      
      <!-- Minus Button (Remove Vote) - Always visible but disabled if no votes -->
      <button
        class="vote-btn minus"
        [disabled]="getUserVoteCount() === 0 || isVoting"
        [matTooltip]="getRemoveVoteTooltip()"
        (click)="removeVote()"
        type="button"
        role="button"
        [attr.aria-label]="'Remove one vote (current: ' + getUserVoteCount() + ' votes)'"
        [attr.data-action]="'remove-vote'">
        <mat-icon aria-hidden="true">remove</mat-icon>
      </button>
      
      <!-- Vote Display -->
      <span class="vote-display" 
            [attr.aria-label]="getVoteDisplayAriaLabel()">
        <span class="vote-status-text">{{ getVoteDisplayText() }}</span>
      </span>
      
      <!-- Plus Button (Add Vote) - Disabled when vote limit reached but ALWAYS visible -->
      <button
        class="vote-btn plus"
        [disabled]="!canAddMoreVotes() || isVoting"
        [matTooltip]="getEnhancedUpvoteTooltip()"
        (click)="addVote()"
        type="button"
        role="button"
        [attr.aria-label]="'Add one vote (current: ' + getUserVoteCount() + ' votes)'"
        [attr.data-action]="'add-vote'">
        <mat-icon aria-hidden="true">add</mat-icon>
      </button>
    </div>

    <!-- 🚨 STATE 2: Own comment (ownership confirmed as true) -->
    <div *ngIf="depth === 0 && cachedIsCurrentUser === true" 
         class="vote-controls own-comment-state"
         role="status"
         aria-label="This is your own comment - voting not allowed">
      <span class="own-comment-indicator">
        <mat-icon>block</mat-icon>
        <span>Eigener Kommentar - Keine Bewertung möglich</span>
      </span>
    </div>

    <!-- 🚨 STATE 3: Ownership unknown (loading/determining user) -->
    <div *ngIf="depth === 0 && cachedIsCurrentUser === null"
         class="vote-controls ownership-loading"
         role="status"
         aria-label="Determining comment ownership...">
      <span class="loading-indicator">
        <mat-spinner diameter="16" strokeWidth="2"></mat-spinner>
        <span>Lade Voting-Status...</span>
      </span>
    </div>


    <!-- Vote Counts - Only for top-level comments (depth = 0) -->
    <span *ngIf="depth === 0" 
          class="vote-count"
          [attr.id]="'vote-stats-' + comment.id"
          role="status"
          [attr.aria-label]="getVoteStatsAriaLabel()"
          [attr.aria-live]="'polite'">
      <span aria-hidden="true" class="vote-display">
        <span class="vote-number">{{ getTotalVotes() }}</span>
        <mat-icon class="thumbs-up-icon">thumb_up</mat-icon>
        <span *ngIf="getUserVotes() > 0" class="user-votes-badge">+{{ getUserVotes() }}</span>
      </span>
    </span>

    <!-- Reply Button - Only for top-level comments (depth = 0) -->
    <button
      *ngIf="depth === 0 && !isReadOnly"
      class="reply-btn"
      [disabled]="isReadOnly"
      [matTooltip]="'Auf diesen Kommentar antworten'"
      (click)="onReply()"
      type="button"
      role="button"
      [attr.aria-label]="'Reply to comment by ' + cachedAuthorDisplayName"
      [attr.aria-describedby]="'comment-content-' + comment.id"
      [attr.data-action]="'reply'">
      <span aria-hidden="true">↵</span>
    </button>

    <!-- Collapsible Panel Toggle (only show if comment has replies) -->
    <button
      *ngIf="hasReplies()"
      class="panel-toggle-btn"
      [ngClass]="{ 'expanded': isPanelExpanded }"
      [matTooltip]="isPanelExpanded ? 'Antworten verbergen' : 'Antworten anzeigen'"
      (click)="onTogglePanel()"
      type="button"
      role="button"
      [attr.aria-label]="(isPanelExpanded ? 'Collapse ' : 'Expand ') + comment.replyCount + ' replies to comment by ' + cachedAuthorDisplayName"
      [attr.aria-expanded]="isPanelExpanded"
      [attr.aria-controls]="'replies-section-' + comment.id"
      [attr.data-reply-count]="comment.replyCount"
      [attr.data-action]="'toggle-replies'">
      <span class="reply-count" aria-hidden="true">{{ getReplyCountText() }}</span>
      <span class="toggle-icon" aria-hidden="true">{{ isPanelExpanded ? '▼' : '▶' }}</span>
    </button>

  </div>

  <!-- Voting Loading Overlay -->
  <div *ngIf="isVoting" 
       class="voting-overlay"
       role="status"
       aria-live="assertive"
       aria-label="Processing vote...">
    <mat-spinner diameter="20" 
                 strokeWidth="2"
                 aria-label="Vote processing"></mat-spinner>
    <span class="sr-only">Your vote is being processed...</span>
  </div>
</div>

<!-- Thread Reply Input removed - using inline-only system -->
