<!-- Chat Bubble Comment -->
<div class="chat-bubble" [ngClass]="isCurrentUser() ? 'own-message' : 'other-message'">

  <!-- Message Header -->
  <div class="message-header">
    <!-- Author Name (left) -->
    <span class="author-name">{{ getAuthorDisplayName() }}</span>

    <!-- Timestamp (right) -->
    <span class="message-time"
          [matTooltip]="comment.createdAt | date:'medium':'de-DE'">
      {{ formattedTime }}
    </span>
  </div>

  <!-- Message Content -->
  <div class="message-content">
    <div class="message-text"
         [innerHTML]="formatContent(sanitizeContent(getDisplayContent()))">
    </div>
  </div>

  <!-- Voting Actions (only for other users' messages) -->
  <div *ngIf="!isCurrentUser() && canVote" class="vote-actions">

    <!-- Plus Vote Button -->
    <button class="vote-btn plus"
            [ngClass]="getUserVote() === 'UP' ? 'voted' : ''"
            [disabled]="isVoting"
            [matTooltip]="'Positiv bewerten'"
            (click)="onVote('UP')">
      <span>+</span>
    </button>

    <!-- Minus Vote Button -->
    <button class="vote-btn minus"
            [ngClass]="getUserVote() === 'DOWN' ? 'voted' : ''"
            [disabled]="isVoting"
            [matTooltip]="'Negativ bewerten'"
            (click)="onVote('DOWN')">
      <span>-</span>
    </button>

    <!-- Vote Counts -->
    <span class="vote-count">
      {{ comment.voteStats!.upVotes || 0 }} 👍 {{ comment.voteStats!.downVotes || 0 }} 👎
    </span>

  </div>

  <!-- Voting Loading Overlay -->
  <div *ngIf="isVoting" class="voting-overlay">
    <mat-spinner diameter="20" strokeWidth="2"></mat-spinner>
  </div>

</div>
