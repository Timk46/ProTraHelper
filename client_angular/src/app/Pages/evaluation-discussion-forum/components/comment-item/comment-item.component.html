<!-- Comment Block (matching chatrichtig.png design) - 🚀 PHASE 2.3: Optimized with cached values -->
<div class="comment-block" [ngClass]="cachedIsCurrentUser ? 'own-comment' : 'other-comment'">
  <!-- Message Header -->
  <div class="message-header">
    <!-- Author Name (left) - cached for performance -->
    <span class="author-name">{{ cachedAuthorDisplayName }}</span>

    <!-- Timestamp (right) -->
    <span class="message-time" [matTooltip]="comment.createdAt | date: 'medium' : 'de-DE'">
      {{ formattedTime }}
    </span>
  </div>

  <!-- Message Content -->
  <div class="message-content">
    <!-- 🚀 PHASE 2.3: Use cached formatted content instead of function chain -->
    <div
      class="message-text"
      [innerHTML]="cachedFormattedContent"
    ></div>
  </div>

  <!-- Voting Actions -->
  <div *ngIf="canVote" class="vote-actions">
    <!-- Plus Vote Button - 🚀 PHASE 2.3: Use cached values for better performance -->
    <button
      class="vote-btn plus"
      [ngClass]="{
        voted: cachedUserVote === 'UP',
        'disabled-limit': !canVoteUp && cachedUserVote !== 'UP',
      }"
      [disabled]="cachedIsCurrentUser || isVoting || (!canVoteUp && cachedUserVote !== 'UP')"
      [matTooltip]="cachedUpvoteTooltip"
      (click)="onVote('UP')"
    >
      <span>+</span>
    </button>

    <!-- Minus Vote Button - 🚀 PHASE 2.3: Use cached values for better performance -->
    <button
      class="vote-btn minus"
      [ngClass]="{
        voted: cachedUserVote === 'DOWN',
        'disabled-limit': !canVoteDown && cachedUserVote !== 'DOWN',
      }"
      [disabled]="cachedIsCurrentUser || isVoting || (!canVoteDown && cachedUserVote !== 'DOWN')"
      [matTooltip]="cachedDownvoteTooltip"
      (click)="onVote('DOWN')"
    >
      <span>-</span>
    </button>

    <!-- Vote Counts -->
    <span class="vote-count">
      {{ comment.voteStats!.upVotes || 0 }} 👍 {{ comment.voteStats!.downVotes || 0 }} 👎
    </span>

    <!-- Reply Button -->
    <button
      class="reply-btn"
      [disabled]="isReadOnly"
      [matTooltip]="'Auf diesen Kommentar antworten'"
      (click)="onReply()"
    >
      <span>↵</span>
    </button>
  </div>

  <!-- Voting Loading Overlay -->
  <div *ngIf="isVoting" class="voting-overlay">
    <mat-spinner diameter="20" strokeWidth="2"></mat-spinner>
  </div>

  <!-- Inline Reply Input -->
  <div *ngIf="showReplyInput" class="reply-input-container">
    <div class="reply-input-wrapper">
      <mat-form-field appearance="outline" class="reply-input-field">
        <mat-label>Antwort schreiben...</mat-label>
        <textarea
          matInput
          [(ngModel)]="replyText"
          placeholder="Ihre Antwort..."
          rows="3"
          maxlength="500"
          [disabled]="isSubmittingReply"
        ></textarea>
        <mat-hint align="end">{{ replyText.length || 0 }}/500</mat-hint>
      </mat-form-field>
      
      <div class="reply-actions">
        <button 
          mat-button 
          color="primary" 
          (click)="onSubmitReply()"
          [disabled]="!replyText.trim() || isSubmittingReply"
        >
          <mat-spinner *ngIf="isSubmittingReply" diameter="16" strokeWidth="2"></mat-spinner>
          {{ isSubmittingReply ? 'Wird gesendet...' : 'Antworten' }}
        </button>
        <button 
          mat-button 
          (click)="onCancelReply()"
          [disabled]="isSubmittingReply"
        >
          Abbrechen
        </button>
      </div>
    </div>
  </div>
</div>
