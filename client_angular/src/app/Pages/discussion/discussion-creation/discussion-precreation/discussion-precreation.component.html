<h2 mat-dialog-title>Zu welchem Bereich möchtest du deinen Beitrag erstellen?</h2>
<mat-dialog-content>
  <mat-list>
    <mat-list-item (click)="onAllSelect()"><em>Betrifft Alle...</em></mat-list-item>
    <mat-list-item *ngFor="let contentNode of contentNodes" (click)="onSelect(contentNode)">
      {{ contentNode.name }}
      <mat-icon class="level-icon" *ngFor="let _ of [].constructor(contentNode.awards)"
        >star</mat-icon
      >
    </mat-list-item>
  </mat-list>
</mat-dialog-content>
<mat-dialog-actions style="padding: 16px">
  <button mat-raised-button (click)="onCancel()">Abbrechen</button>
</mat-dialog-actions>
