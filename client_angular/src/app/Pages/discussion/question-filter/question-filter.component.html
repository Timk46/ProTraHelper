<div class="content mat-elevation-z8">
  <div class="row">
    <h2>Filter:</h2>
    <!-- select all button -->
    <button *ngIf="allSelected" mat-raised-button>Alle</button>
    <button *ngIf="!allSelected" (click)="onAllQuestions()" mat-stroked-button>Alle</button>
    <!-- filter button -->
    <button  *ngIf="allSelected" (click)="onSelectFilter()" mat-stroked-button >
      {{ filterTitle }}
      <span class="{{filterSelection ? 'arrow-up' : 'arrow-down'}}"></span>
    </button>
    <button  *ngIf="!allSelected" (click)="onSelectFilter()" mat-raised-button>
      {{ filterTitle }}
      <span class="{{filterSelection ? 'arrow-up' : 'arrow-down'}}"></span>
    </button>
  </div>
  <!-- the filter seclection box -->
  <div [ngClass]="{'fade-in-out': true, 'active': filterSelection}">
    <hr>
    <app-graph></app-graph>
    <hr>
    <div style="margin-bottom: 9px; margin-left: 5px;"> <!-- fix gesucht, momentan ein Workaround, da sonst Schatten abgeschnitten -->
      <!-- only clickable, if content node chosen -->
      <button *ngIf="activeConceptNode.databaseId > 0" (click)="onFilterSelected()" mat-raised-button>Wählen</button> <!-- Hier nochmal schauen, ob es nicht doch eine Node mit id 0 gibt -->
      <button *ngIf="activeConceptNode.databaseId <= 0" [disabled]="true"  mat-stroked-button>Wählen</button> <!-- genauso hier -->
    </div>
  </div>

</div>
