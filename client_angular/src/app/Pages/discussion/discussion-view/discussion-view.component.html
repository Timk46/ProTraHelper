<div *ngIf="discussionData.id != -1 && initiatorMessage.messageId != -1" class="main-container">
  <div style="max-width: 1000px;">
    <div class="content mat-elevation-z8">
      <h1>{{discussionData.title}}</h1>
      <app-discussion-view-question [messageData]="initiatorMessage" [conceptNodeName]="conceptNodeName" [discussionData]="discussionData"></app-discussion-view-question>
    </div>
    <div class="content mat-elevation-z8">
      <app-discussion-view-create
        [discussionId]="discussionData.id"
        (refreshMessages)="refreshMessages()">
      </app-discussion-view-create>
    </div>
    <div class="content mat-elevation-z8">
      <h1>Antworten</h1>
      <app-discussion-view-message *ngFor="let message of messagesData" [messageData]="message"></app-discussion-view-message>
    </div>
  </div>
</div>
