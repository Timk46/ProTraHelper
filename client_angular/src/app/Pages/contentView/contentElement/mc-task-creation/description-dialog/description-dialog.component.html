<h1 mat-dialog-title>Set a Description</h1>
<div mat-dialog-content>
  <mat-form-field>
    <textarea
      class="area"
      matInput
      [(ngModel)]="data.description"
      type="text"
      placeholder="Description"
      cdkTextareaAutosize
      #autosize="cdkTextareaAutosize"
      cdkAutosizeMinRows="1"
    >
    </textarea>
  </mat-form-field>
</div>
<div mat-dialog-actions class="size-buttons">
  <button
    mat-raised-button
    color="primary"
    type="button"
    [mat-dialog-close]="data.description"
    cdkFocusInitial
  >
    Accept
  </button>
  <button mat-raised-button color="warn" type="button" (click)="onNoClick()">Delete</button>
</div>
