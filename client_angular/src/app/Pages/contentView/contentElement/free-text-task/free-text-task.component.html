<div class="task-container">
    <mat-card class="task-card">
        <mat-card-header>
            <mat-card-title-group>
                <mat-card-title>{{questionData.text}}</mat-card-title>
            </mat-card-title-group>
        </mat-card-header>
        <mat-card-content>
            <p>{{questionData.description}}</p>
            <!-- <mat-form-field>
                <textarea matInput placeholder="Antwort" [(ngModel)]="answerText"></textarea>
            </mat-form-field> -->
            <div style="padding: 10px">
                <app-tinymce #textEdit [config]="editorConfig" [content]="''"></app-tinymce>
            </div>
        </mat-card-content>
        <mat-card-actions align="end">
            <button mat-flat-button color="accent" (click)="onSubmit(textEdit.getContent())">Antworten</button>
        </mat-card-actions>
    </mat-card>
</div>
