<div class="task-container mat-elevation-z8">
  <div class="close-button">
    <button *ngIf="!collectionMode" mat-icon-button (click)="onClose()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  <mat-card class="task-card">
    <mat-card-header>
      <mat-card-title-group>
        <mat-card-title>{{ freeTextQuestion.title }}</mat-card-title>
      </mat-card-title-group>
    </mat-card-header>
    <mat-card-content>
      <p>{{ freeTextQuestion.text }}</p>
      <!-- <mat-form-field>
        <textarea matInput placeholder="Antwort" [(ngModel)]="answerText"></textarea>
      </mat-form-field> -->
      <div style="padding: 10px">
        <app-tinymce #textEdit [config]="editorConfig" [content]="answerText"></app-tinymce>
      </div>
    </mat-card-content>
    <mat-card-actions align="end">
      <button
        [disabled]="isSending"
        mat-flat-button
        color="accent"
        (click)="onSubmit(textEdit.getContent(), textEdit.getRawContent())"
      >
        <span *ngIf="!isSending">Abgeben</span
        ><mat-spinner *ngIf="isSending" style="width: 20px; height: 20px"></mat-spinner>
      </button>
    </mat-card-actions>
  </mat-card>

  <mat-card *ngIf="feedbackText.length > 0" class="feedback">
    <mat-card-header>
      <mat-card-title>Feedback</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p [innerHTML]="feedbackText"></p>
    </mat-card-content>
  </mat-card>
</div>
