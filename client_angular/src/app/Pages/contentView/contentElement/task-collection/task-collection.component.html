<div class="collection-wrapper" *ngIf="questionCollection">
  <div class="collection-header">
    <h2>{{ questionCollection.id }}</h2>
    <p class="progress-text" *ngIf="sortedTasks.length > 0">
      Aufgabe {{ currentIndex + 1 }} von {{ sortedTasks.length }}
    </p>
  </div>

  <div class="task-host-container">
    <!-- This is where the dynamic task component will be injected -->
    <ng-template #taskHost></ng-template>

    <!-- Placeholder for unsupported task types -->
    <div *ngIf="!componentRef" class="unsupported-task">
      <mat-icon>warning</mat-icon>
      <p>Dieser Aufgabentyp wird in einer Sammlung noch nicht unterstützt.</p>
    </div>
  </div>

  <div class="collection-footer" *ngIf="sortedTasks.length > 0">
    <button
      mat-stroked-button
      color="primary"
      (click)="goToPreviousTask()"
      [disabled]="currentIndex <= 0"
    >
      <mat-icon>navigate_before</mat-icon>
      Zurück
    </button>

    <mat-progress-bar
      mode="determinate"
      [value]="((currentIndex + (isCurrentTaskCompleted ? 1 : 0)) / sortedTasks.length) * 100"
    ></mat-progress-bar>

    <button
      mat-flat-button
      color="primary"
      (click)="goToNextTask()"
      [disabled]="!isCurrentTaskCompleted"
      [matTooltip]="isCurrentTaskCompleted ? '' : 'Bitte schließe die aktuelle Aufgabe zuerst ab.'"
    >
      <span *ngIf="currentIndex < sortedTasks.length - 1">Weiter</span>
      <span *ngIf="currentIndex >= sortedTasks.length - 1">Abschließen</span>
      <mat-icon>navigate_next</mat-icon>
    </button>
  </div>
</div>
