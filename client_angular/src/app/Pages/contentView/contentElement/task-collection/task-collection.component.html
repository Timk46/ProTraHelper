<div class="collection-wrapper enhanced" *ngIf="questionCollection">
  <!-- Close Button -->
  <div class="close-button">
    <button mat-icon-button (click)="onClose()" aria-label="Aufgabensammlung schließen">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Start Page View (existing logic, new container) -->
  <div class="start-page-container" *ngIf="showStartPage; else taskView">
    <div class="start-page-header">
      <h2>{{ questionCollection.title }}</h2>
    </div>
    <div class="start-page-content" [innerHTML]="questionCollection.textHTML"></div>
    <div class="start-page-footer">
      <button mat-flat-button color="primary" (click)="startTasks()">Los geht's!</button>
    </div>
  </div>

  <!-- Enhanced Task View -->
  <ng-template #taskView>
    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-container">
      <div class="loading">
        <div class="loading__spinner"></div>
        <p class="loading__text">Aufgabe wird geladen...</p>
      </div>
    </div>

    <!-- Progress Header - Compact -->
    <div class="progress-header progress-header--compact">
      <div class="progress-info" *ngIf="sortedTasks.length > 0">
        <span class="progress-info__current">
          Aufgabe {{ currentIndex + 1 }} von {{ sortedTasks.length }}
        </span>
        <span class="progress-info__completed">
          {{ getCompletedTasksCount() }} von {{ sortedTasks.length }} abgeschlossen
        </span>
      </div>
    </div>

    <!-- Progress Dots Navigation -->
    <div class="progress-dots" role="tablist" *ngIf="sortedTasks.length > 0">
      <button
        *ngFor="let task of sortedTasks; let i = index"
        class="progress-dot"
        [class.progress-dot--current]="i === currentIndex"
        [class.progress-dot--completed]="isTaskCompleted(i)"
        [class.progress-dot--disabled]="!isTaskAccessible(i)"
        [disabled]="!isTaskAccessible(i)"
        (click)="goToTask(i)"
        [attr.aria-label]="'Zu Aufgabe ' + (i + 1) + ' gehen'"
        [matTooltip]="
          isTaskAccessible(i)
            ? 'Aufgabe ' + (i + 1)
            : 'Schließe erst die vorherigen Aufgaben ab'
        "
      >
        <mat-icon *ngIf="isTaskCompleted(i)">check</mat-icon>
        <span *ngIf="!isTaskCompleted(i)">{{ i + 1 }}</span>
      </button>
    </div>

    <!-- Task Content Container -->
    <div class="task-content-container" [class.loading]="isLoading">
      <!-- This is where the dynamic task component will be injected -->
      <ng-template #taskHost></ng-template>

      <!-- Placeholder for unsupported task types -->
      <div *ngIf="!componentRef && sortedTasks.length > 0 && !isLoading" class="unsupported-task">
        <mat-icon>warning</mat-icon>
        <p>Dieser Aufgabentyp wird in einer Sammlung noch nicht unterstützt.</p>
      </div>
    </div>

    <!-- Fixed Footer -->
    <div class="fixed-footer" *ngIf="sortedTasks.length > 0">
      <div class="footer-content">
        <!-- Left Navigation -->
        <button
          mat-icon-button
          (click)="goToPreviousTask()"
          [disabled]="currentIndex <= 0"
          aria-label="Vorherige Aufgabe"
        >
          <mat-icon>navigate_before</mat-icon>
        </button>

        <!-- Center Progress -->
        <div class="center-progress">
          <mat-progress-bar mode="determinate" [value]="getOverallProgress()"></mat-progress-bar>
        </div>

        <!-- Right Navigation -->
        <button
          mat-flat-button
          color="primary"
          (click)="goToNextTask()"
          [disabled]="!isCurrentTaskCompleted"
          [matTooltip]="
            !isCurrentTaskCompleted ? 'Bitte schließe die aktuelle Aufgabe zuerst ab.' : ''
          "
        >
          <span *ngIf="currentIndex < sortedTasks.length - 1">Weiter</span>
          <span *ngIf="currentIndex >= sortedTasks.length - 1">Abschließen</span>
          <mat-icon>navigate_next</mat-icon>
        </button>
      </div>
    </div>
  </ng-template>
</div>
