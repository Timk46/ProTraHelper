<form [formGroup]="form" class="chat-container">
  <mat-card [ngClass]="display" class="collapsible-chat">
      <mat-card-header class="chat-header">
          <img mat-card-avatar src="../../../../assets/img/kai_logo_small.png" class="chat-icon">
          <mat-card-title class="chat-title">Chatbot</mat-card-title>
          <mat-card-subtitle class="chat-subtitle">
              <div class="status-icon"></div>
              <span>LectureLinker</span>
          </mat-card-subtitle>
      </mat-card-header>
      <mat-card-content class="chat-content" #messageContainer>
          <div *ngFor="let message of messages" class="messages">
              <div [ngClass]="'message ' + message.type">
                  <!--<div class="prose max-w-none prose-stone prose-base" [innerHTML]="message.text"></div>-->
                  <div [innerHTML]="message.text"></div>
              </div>
          </div>
      </mat-card-content>
      <mat-card-actions class="chat-actions">
        <mat-form-field appearance="outline" class="chat-form">
          <textarea
            class="chat-input"
            matInput
            type="text"
            placeholder="Deine Frage..."
            formControlName="message"
            (keydown.enter)="onClickEnter($event)"
          ></textarea>
          <button
            class="send-button"
            matSuffix
            mat-icon-button
            aria-label="Send"
            (click)="onClickSendMessage()"
            [disableRipple]="true"
            [disabled]="!canSendMessage"
          >
            <mat-icon class="send-icon">{{ canSendMessage ? 'send' : 'stop' }}</mat-icon>
          </button>
        </mat-form-field>
      </mat-card-actions>
  </mat-card>
</form>
