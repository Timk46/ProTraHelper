<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <div class="form-section">
      <h3>Select Concept Node</h3>
      <p class="concept-selection-info">
        {{
          selectedConceptId
            ? 'Selected concept ID: ' + selectedConceptId
            : 'Please select a concept node'
        }}
      </p>

      <!-- Mobile Navigator Component for concept selection -->
      <div class="mobile-navigator-container">
        <app-mobile-navigator
          [selectionMode]="true"
          (selectionChange)="onSelectionChange($event)"
        ></app-mobile-navigator>
      </div>
    </div>

    <div class="form-section">
      <h3>Highlight Details</h3>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Title</mat-label>
        <input matInput formControlName="alias" placeholder="Enter a title" />
        <mat-error *ngIf="form.get('alias')?.hasError('required')"> Title is required </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea
          matInput
          formControlName="description"
          placeholder="Enter a description"
          rows="3"
        ></textarea>
      </mat-form-field>

      <div class="image-input-section">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Image URL</mat-label>
          <input matInput formControlName="pictureData" placeholder="Enter image URL" />
        </mat-form-field>

        <div class="file-upload-container">
          <h4>Or upload an image</h4>
          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)"
            #fileInput
            class="file-input"
          />
          <button
            mat-raised-button
            color="primary"
            (click)="fileInput.click()"
            class="file-upload-button"
          >
            <mat-icon>upload</mat-icon> Choose Image
          </button>
          <span *ngIf="selectedFileName" class="selected-file-name">{{ selectedFileName }}</span>
        </div>
      </div>

      <mat-form-field appearance="outline">
        <mat-label>Position</mat-label>
        <input matInput type="number" formControlName="position" placeholder="Enter position" />
      </mat-form-field>

      <mat-slide-toggle formControlName="isUnlocked" color="primary">
        Is Unlocked
      </mat-slide-toggle>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button
    mat-raised-button
    color="primary"
    (click)="onSubmit()"
    [disabled]="form.invalid || !selectedConceptId"
  >
    {{ isEditMode ? 'Update' : 'Create' }}
  </button>
</mat-dialog-actions>
