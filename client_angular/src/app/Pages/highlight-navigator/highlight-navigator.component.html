<div class="highlight-navigator-container">
  <div class="highlight-tiles-container">
    <!-- Loading indicator -->
    <div *ngIf="isLoading" class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <!-- No concepts message -->
    <div *ngIf="!isLoading && highlightConcepts.length === 0" class="no-concepts-message">
      <p>No highlight concepts available.</p>
      <button *ngIf="canModify()" mat-raised-button color="primary" (click)="addNewConcept()">
        <mat-icon>add</mat-icon> Add Highlight
      </button>
    </div>

    <!-- Highlight tiles -->
    <div class="highlight-tiles-grid">
      <!-- Add button (only in edit mode) -->
      <div *ngIf="canModify()" class="add-tile-container">
        <button mat-raised-button color="primary" class="add-button" (click)="addNewConcept()">
          <mat-icon>add</mat-icon>
          <span>Add Highlight</span>
        </button>
      </div>

      <!-- Highlight tiles -->
      <a
        *ngFor="let concept of highlightConcepts"
        class="highlight-tile"
        [class.locked]="!concept.isUnlocked"
        (mouseenter)="setHoveredTile(concept.id)"
        (mouseleave)="setHoveredTile(null)"
        (click)="concept.isUnlocked ? navigateToConcept(concept, $event) : $event.preventDefault()"
      >
        <!-- Title -->
        <h3 class="highlight-title">{{ concept.alias || (concept.conceptNode?.name || 'Untitled') }}</h3>

        <!-- Image container -->
        <div class="highlight-image-container">
          <img
            [src]="concept.pictureData || 'https://via.placeholder.com/300'"
            [alt]="concept.alias || 'Highlight image'"
            class="highlight-image"
            [class.grayscale]="!concept.isUnlocked"
          />

          <!-- Description overlay (shown on hover) -->
          <div class="highlight-description-overlay" [class.visible]="hoveredTileId === concept.id">
            <p class="highlight-description">{{ concept.description || 'No description available' }}</p>
          </div>

          <!-- Action buttons (only in edit mode, shown on hover) -->
          <div class="action-buttons" *ngIf="canModify() && hoveredTileId === concept.id">
            <!-- Edit button -->
            <button
              mat-icon-button
              color="primary"
              class="edit-button"
              (click)="editConcept(concept, $event)"
              aria-label="Edit highlight"
            >
              <mat-icon>edit</mat-icon>
            </button>

            <!-- Delete button -->
            <button
              mat-icon-button
              color="warn"
              class="delete-button"
              (click)="deleteConcept(concept.id, $event)"
              aria-label="Delete highlight"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
