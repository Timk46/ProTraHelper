<div class="nav-toggle-container">
  <button
    mat-button
    class="nav-toggle-button"
    [matTooltip]="toggleTooltip"
    (click)="toggleNavigationPreference()">
    <mat-icon>{{ toggleIcon }}</mat-icon>
    <span>{{ toggleLabel }}</span>
  </button>

  <button
    *ngIf="isEditMode"
    mat-icon-button
    class="settings-button"
    matTooltip="Navigationsmöglichkeiten konfigurieren"
    (click)="openSettings()">
    <mat-icon>settings</mat-icon>
  </button>
</div>
