<h2 mat-dialog-title>ContentNode bearbeiten</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field>
      <input matInput placeholder="Name" formControlName="name" />
      <mat-error *ngIf="form.get('name')!.hasError('required')">Name ist erforderlich</mat-error>
    </mat-form-field>

    <mat-form-field>
      <textarea matInput placeholder="Beschreibung" formControlName="description"></textarea>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Schwierigkeit</mat-label>
      <mat-select formControlName="difficulty">
        <mat-option *ngFor="let star of [1, 2, 3, 4, 5]" [value]="star">
          Level {{ star }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('difficulty')!.hasError('required')"
        >Schwierigkeitsgrad ist erforderlich</mat-error
      >
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Abbrechen</button>
  <button mat-button color="primary" [disabled]="!form.valid" (click)="onSubmit()">
    Speichern
  </button>
</mat-dialog-actions>
