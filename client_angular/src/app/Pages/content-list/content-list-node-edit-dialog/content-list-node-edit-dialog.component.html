<h2 mat-dialog-title>ContentNode bearbeiten</h2>
<mat-dialog-content>
  <div class="form-container">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput [(ngModel)]="name" placeholder="Name eingeben" />
    </mat-form-field>

    <!-- Rich text HTML description field -->
    <div class="html-editor-container">
      <label class="editor-label">Beschreibung (HTML)</label>
      <app-tinymce #desceditor [config]="editorConfig"></app-tinymce>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Schwierigkeit</mat-label>
      <mat-select [(ngModel)]="difficulty">
        <mat-option *ngFor="let star of [1, 2, 3, 4, 5]" [value]="star">
          Level {{ star }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Abbrechen</button>
  <button mat-raised-button color="primary" (click)="onSubmit()">Speichern</button>
</mat-dialog-actions>
