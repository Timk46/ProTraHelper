<div class="content-list-container">
  <!-- Search and Sort section -->
  <div *ngIf="!isArchitectureStudent" style="display: flex">
    <div class="search-bar">
      <!-- <h3>Suchen</h3> -->
      <mat-form-field
        appearance="outline"
        subscriptSizing="dynamic"
        style="background-color: white"
      >
        <mat-icon matPrefix>search</mat-icon>
        <input
          matInput
          type="text"
          [(ngModel)]="searchTerm"
          (keyup)="applyFilter()"
          placeholder="Suche nach Inhalten"
        />
        <button
          *ngIf="searchTerm"
          matSuffix
          mat-icon-button
          aria-label="Clear"
          (click)="searchTerm = ''; applyFilter()"
        >
          <mat-icon>close</mat-icon>
        </button>
      </mat-form-field>
    </div>
  </div>

  <!-- Task section -->
  <mat-accordion
    class="content-list"
    multi="true"
    cdkDropList
    cdkDropListOrientation="vertical"
    [cdkDropListData]="filteredContents"
    (cdkDropListDropped)="onContentNodeDrop($event)"
    [cdkDropListDisabled]="!editModeActive"
  >
    <mat-expansion-panel
      *ngFor="let content of filteredContents; let i = index"
      [expanded]="false"
      class="content-list-item"
      [ngClass]="{ 'not-visible': !content.isVisible }"
      cdkDrag
      [cdkDragDisabled]="!editModeActive"
    >
      <mat-expansion-panel-header>
        <!-- Drag Handle -->
        <div
          *ngIf="isAdmin && editModeActive"
          class="drag-handle"
          cdkDragHandle
          matTooltip="Ziehen zum Verschieben"
        >
          <mat-icon>drag_indicator</mat-icon>
        </div>
        <mat-panel-title style="flex-grow: 3">
          {{ content.name }}
        </mat-panel-title>
        <mat-panel-description class="content-list-element-header-description">
          <!-- stars to show difficulty and progress -->
          <div class="content-list-element-header-stars">
            <mat-icon *ngFor="let reached of getLevels(content.levelProgress || 0)">star</mat-icon>
            <mat-icon *ngFor="let level of getLevels(content.level - (content.levelProgress || 0))"
              >star_border</mat-icon
            >
          </div>

          <!-- more indicators -->
          <div class="content-list-element-header-indicators">
            <mat-icon *ngIf="!content.isVisible" matTooltip="Unsichtbar für Lernende."
              >visibility_off
            </mat-icon>
            <mat-icon
              *ngIf="hasContentElementType(content, 'QUESTION')"
              matTooltip="Enthält Übungsaufgaben."
              >rate_review
            </mat-icon>
            <mat-icon
              class="node-question"
              *ngIf="content.questionMarked"
              matTooltip="Mindestens ein Inhalt wurde mit einem ? markiert."
              >help
            </mat-icon>

          </div>
        </mat-panel-description>
      </mat-expansion-panel-header>
      <!-- the content item body -->
      <div class="content-list-element-introduction">
        <!-- stars to show difficulty and progress - only in mobile view -->
        <div class="content-list-element-introduction-stars">
          <mat-icon *ngFor="let reached of getLevels(content.levelProgress || 0)">star</mat-icon>
          <mat-icon *ngFor="let level of getLevels(content.level - (content.levelProgress || 0))"
            >star_border</mat-icon
          >
        </div>

        <!-- description -->
        <p
          class="content-list-element-description"
          [innerHTML]="content.descriptionHTML || content.description"
        ></p>

        <!-- button bar -->
        <div class="content-list-element-introduction-buttons">
          <button
            *ngIf="shouldShowRhinoButton(content)"
            mat-raised-button
            class="rhino-button"
            (click)="onRhinoBatDirectButtonClick($event)"
          >
            <mat-icon>flash_on</mat-icon>
            Rhino
          </button>
          <button
            *ngIf="hasContentElementType(content, 'PDF')"
            mat-raised-button
            color="primary"
            (click)="onContentClick(content, ['PDF'], $event)"
          >
            <mat-icon>picture_as_pdf</mat-icon>
            PDF
          </button>
          <button
            *ngIf="hasContentElementType(content, 'VIDEO')"
            mat-raised-button
            color="primary"
            (click)="onContentClick(content, ['VIDEO'], $event)"
          >
            <mat-icon>play_circle_outline</mat-icon>
            Video
          </button>
        </div>
      </div>
      <h2
        style="margin-top: 10px"
        *ngIf="content.taskSectorTitle || getQuestions(content).length > 0"
      >
        {{ content.taskSectorTitle }}
      </h2>
      <div
        class="content-list-element-items"
        cdkDropList
        cdkDropListOrientation="mixed"
        [cdkDropListData]="getQuestions(content)"
        (cdkDropListDropped)="onTaskDrop($event, content)"
        [cdkDropListDisabled]="!editModeActive"
      >
        <app-content-list-item
          *ngFor="let task of getQuestions(content)"
          cdkDrag
          [cdkDragDisabled]="!editModeActive"
          [contentElementData]="task"
          [contentNodeId]="content.contentNodeId"
          [allContentElements]="content.contentElements"
          (scoreUpdated)="onScoreUpdated(content, $event)"
          (fetchContentsForConcept)="fetchContentsForConcept.emit()"
          (contentElementDeleted)="onContentElementDeleted(content.contentNodeId, $event)"
        ></app-content-list-item>
      </div>

      <!-- edit mode actions -->
      <mat-action-row *ngIf="isAdmin && editModeActive">
        <button
          mat-mini-fab
          color="primary"
          (click)="$event.stopPropagation(); onNodeVisibilityToggle(content)"
          [matTooltip]="
            content.isVisible
              ? 'Sichtbar für Lernende. Klicken, um unsichtbar zu schalten'
              : 'Unsichtbar für Lernende. Klicken, um sichtbar zu schalten'
          "
        >
          <mat-icon>{{ content.isVisible ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
        <!-- <button
          mat-mini-fab
          color="accent"
          (click)="onMoveContentUp(content)"
          matTooltip="Bereich nach oben verschieben"
        >
          <mat-icon>arrow_upward</mat-icon>
        </button>
        <button
          mat-mini-fab
          color="accent"
          (click)="onMoveContentDown(content)"
          matTooltip="Bereich nach unten verschieben"
        >
          <mat-icon>arrow_downward</mat-icon>
        </button> -->
        <button
          mat-mini-fab
          color="primary"
          (click)="onEditContentNode(content)"
          matTooltip="Bereich bearbeiten"
        >
          <mat-icon>edit</mat-icon>
        </button>
        <button
          mat-mini-fab
          color="primary"
          (click)="onAddTask(content.contentNodeId)"
          matTooltip="Aufgabe hinzufügen"
        >
          <mat-icon>add</mat-icon>
        </button>

        <!-- spacer -->
        <div style="width: 10px"></div>

        <button
          mat-mini-fab
          color="warn"
          (click)="onDeleteContentNode(content.contentNodeId)"
          matTooltip="Verknüpfung zum Bereich aufheben"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </mat-action-row>
    </mat-expansion-panel>
  </mat-accordion>
</div>
