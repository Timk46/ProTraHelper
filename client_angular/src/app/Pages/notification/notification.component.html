    <div class="notification-snackbar">
      <span>{{ data.message }}</span>
      <button mat-button *ngIf="data.actionText" (click)="performAction()">{{ data.actionText }}</button>
      <button mat-icon-button (click)="closeSnackBar()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
