<p>Task-Overview for ConceptNodeID: {{activeConceptNodeId}}</p>
<p>Taks-IDs for Concept: {{questionsIDsForConcept}}</p>

<div class="taskProgress-Container">
    <mat-card class="task-progress-card" class="failed">
        <mat-card-header>
            <mat-card-title-group> 
                <mat-card-title>Fortschritt für {{activeConceptNodeId}}</mat-card-title>
            </mat-card-title-group>
        </mat-card-header>
        <mat-card-content>
            <section>
                Faktenwissen (60%)
                <mat-progress-bar mode="determinate" value="60" color="warn"></mat-progress-bar>
            </section>
            <section>
                Programmieraufgaben (40%)
                <mat-progress-bar mode="determinate" value="40" color="warn"></mat-progress-bar>
            </section>
        </mat-card-content>
    </mat-card>
</div>

    <mat-card *ngFor="let question of questionIdentityData" class="task-overview-card" (click)="onTaskIdentityClick(question)">
        <mat-card-header>
            <mat-card-title-group> 
                <mat-card-title>Aufgabe</mat-card-title>
            </mat-card-title-group>
        </mat-card-header>  
        <mat-card-content>
            {{question.type}}<br>
            Versuche: {{question.attempts}}
        </mat-card-content>
        <mat-card-footer>
            <mat-progress-bar mode="determinate" value="{{question.progress}}" color="{{question.color}}"></mat-progress-bar>
        </mat-card-footer>
    </mat-card>
</div>
