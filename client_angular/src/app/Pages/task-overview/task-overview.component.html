<div class="task-container" class="mat-elevation-z8">
  <table mat-table [dataSource]="taskOverviewData" matSort>
    
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>
    
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>
    
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Aufgabentyp </th>
        <td mat-cell *matCellDef="let element"> {{element.type}} </td>
      </ng-container>
    
      <ng-container matColumnDef="attempts">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Versuche </th>
          <td mat-cell *matCellDef="let element"> {{element.attempts}} </td>
      </ng-container>

      <ng-container matColumnDef="level">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Kompetenzlevel </th>
        <td mat-cell *matCellDef="let element"> {{element.level}} </td>
    </ng-container>

      <ng-container matColumnDef="progress">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Fortschritt </th>
        <td mat-cell *matCellDef="let row">
          <mat-progress-spinner [value]="row.progress" [mode]="'determinate'" [diameter]="30"></mat-progress-spinner>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Aktionen </th>
        <td mat-cell *matCellDef="let row">
          <button mat-raised-button color="primary" (click)="onTaskClick(row)" class="button">Lösen</button>
          <!-- <button mat-raised-button color="primary" class="button">Feedback Historie</button> -->
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
  </table>
</div>
