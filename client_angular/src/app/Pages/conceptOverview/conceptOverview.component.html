<!-- <div *ngIf="(isHandset$ | async) === true" class="button-group" style="display: flex;">
  <button mat-button [ngClass]="{'active': activeTab === 'content'}" (click)="activeTab = 'content'">Bearbeiten</button>
  <button mat-button [ngClass]="{'active': activeTab === 'discussion'}" (click)="activeTab = 'discussion'">Diskutieren</button>
</div> -->
<div
  *ngIf="activeConceptNode.databaseId > 0 && activeConceptNode.name !== 'dummys'"
  class="content mat-elevation-z8"
>
  <div
    *ngIf="(isHandset$ | async) === true && !editModeActive && showDiscussionButtons"
    class="button-group"
    style="display: flex"
  >
    <button
      mat-button
      [ngClass]="{ active: activeTab === 'content' }"
      (click)="activeTab = 'content'"
    >
      Bearbeiten
    </button>
    <button
      mat-button
      [ngClass]="{ active: activeTab === 'discussion' }"
      (click)="activeTab = 'discussion'"
    >
      Diskutieren
    </button>
  </div>
  <div class="header">
    <h1 *ngIf="sSS.isLandscape | async" matTooltip="Id: {{ activeConceptNode.databaseId }}">
      {{ activeConceptNode.name }}
    </h1>
    <h1 *ngIf="!(sSS.isLandscape | async)">{{ activeConceptNode.name }}</h1>
    <div *ngIf="(isHandset$ | async) === false && !editModeActive && showDiscussionButtons" class="button-group">
      <button
        mat-button
        [ngClass]="{ active: activeTab === 'content' }"
        (click)="activeTab = 'content'"
      >
        Bearbeiten
      </button>
      <button
        mat-button
        [ngClass]="{ active: activeTab === 'discussion' }"
        (click)="activeTab = 'discussion'"
      >
        Diskutieren
      </button>
    </div>
  </div>

  <!-- Display HTML description if available, otherwise plain text description -->
  <div
    *ngIf="activeConceptNode.descriptionHTML && activeConceptNode.descriptionHTML.trim() !== ''"
    [innerHTML]="activeConceptNode.descriptionHTML"
    class="concept-description-html"
  ></div>
  <p
    *ngIf="!activeConceptNode.descriptionHTML || activeConceptNode.descriptionHTML.trim() === ''"
    class="concept-description-text"
  >
    {{ activeConceptNode.description }}
  </p>

  <div *ngIf="editModeActive" style="display: flex; flex-direction: row; gap: 8px">
    <button mat-mini-fab color="primary" (click)="onCreateContentNode()">
      <mat-icon>add</mat-icon>
    </button>
    <button mat-mini-fab color="primary" (click)="onEditOverview()">
      <mat-icon>edit</mat-icon>
    </button>
  </div>

  <!-- <div [ngStyle]="{'display': activeTab === 'content' ? 'block' : 'none'}" class="tab-content-container">
    <app-contentBoard class="tab-content" [contentsForActiveConceptNode]="contentsForActiveConceptNode"
      [activeConceptNodeId]="activeConceptNode.databaseId" (fetchContentsForConcept)="onFetchContentsForConcept()"></app-contentBoard>
  </div> -->

  <div
    [ngStyle]="{ display: activeTab === 'content' ? 'block' : 'none' }"
    class="tab-content-container"
  >
    <app-content-list
      class="tab-content"
      [contentsForActiveConceptNode]="contentsForActiveConceptNode"
      [activeConceptNodeId]="activeConceptNode.databaseId"
      (fetchContentsForConcept)="onFetchContentsForConcept()"
    >
      <div class="action-buttons-top">
        <button mat-stroked-button color="primary">
          <mat-icon>picture_as_pdf</mat-icon>
          PDF
        </button>
        <button mat-stroked-button color="primary">
          <mat-icon>play_circle_outline</mat-icon>
          Video
        </button>
      </div>
      <router-outlet></router-outlet>
    </app-content-list>
  </div>

  <div
    *ngIf="!editModeActive && showDiscussionButtons"
    [ngStyle]="{ display: activeTab === 'discussion' ? 'block' : 'none' }"
    class="tab-content-container"
  >
    <app-discussion-list [activeConceptNodeId]="activeConceptNode.databaseId"></app-discussion-list>
  </div>
</div>

<!-- Loading indicator while concept data is being loaded -->
<div
  *ngIf="activeConceptNode.databaseId <= 0 || activeConceptNode.name === 'dummys'"
  class="loading-container mat-elevation-z8"
>
  <mat-spinner diameter="40"></mat-spinner>
  <p>Loading concept data...</p>
</div>

<style>
  .action-buttons-top {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    margin-bottom: 24px;
  }

  .action-buttons-top button {
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
