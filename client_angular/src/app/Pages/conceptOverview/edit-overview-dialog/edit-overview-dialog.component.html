<h2 mat-dialog-title>Konzept-Übersicht bearbeiten</h2>

<mat-dialog-content>
  <div class="form-container">
    <!-- Name field -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput [(ngModel)]="name" placeholder="Konzept-Name eingeben">
    </mat-form-field>

    <!-- Plain text description field -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Beschreibung (Text)</mat-label>
      <textarea matInput [(ngModel)]="description" rows="3" placeholder="Einfache Textbeschreibung"></textarea>
    </mat-form-field>

    <!-- Rich text HTML description field -->
    <div class="html-editor-container">
      <label class="editor-label">Beschreibung (HTML)</label>
      <editor
        [init]="tinymceConfig"
        [(ngModel)]="descriptionHTML"
        [initialValue]="descriptionHTML">
      </editor>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Abbrechen</button>
  <button mat-raised-button color="primary" (click)="onSave()">Speichern</button>
</mat-dialog-actions>
