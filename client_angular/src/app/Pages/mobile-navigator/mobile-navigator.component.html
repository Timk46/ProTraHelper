<div class="navigation-container" *ngIf="loadingDone">
  <!-- Breadcrumb navigation with search icon -->
  <div class="breadcrumb-container">
    <div class="breadcrumbs" *ngIf="!isSearchVisible">
      <a
        *ngFor="let item of openLayers; let i = index"
        [ngClass]="{ active: i === openLayers.length - 1 }"
        (click)="onTabClick(i)"
      >
        {{ item.name }}
        <mat-icon *ngIf="i < openLayers.length - 1">chevron_right</mat-icon>
      </a>
    </div>

    <!-- Search toggle button (visible when search is hidden) -->
    <button
      *ngIf="!isSearchVisible"
      mat-icon-button
      class="search-toggle-btn"
      (click)="showSearch()"
      matTooltip="Suchen"
    >
      <mat-icon>search</mat-icon>
    </button>

    <!-- Collapsible search input (visible when search is shown) -->
    <div class="collapsible-search" *ngIf="isSearchVisible" [@searchAnimation]="'visible'">
      <mat-form-field appearance="outline" class="search-field">
        <input
          matInput
          type="text"
          [(ngModel)]="searchQuery"
          (input)="onSearchInput()"
          placeholder="Konzepte durchsuchen"
          #searchInput
        />
        <button matSuffix mat-icon-button aria-label="Clear" (click)="hideSearch()">
          <mat-icon>close</mat-icon>
        </button>
      </mat-form-field>
    </div>
  </div>

  <!-- Search results -->
  <div class="search-results" *ngIf="searchQuery && searchResults.length > 0">
    <div class="results-header">
      <span>Suchergebnisse</span>
      <button mat-icon-button (click)="clearSearch()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    <mat-nav-list>
      <a
        mat-list-item
        *ngFor="let result of searchResults"
        (click)="navigateToSearchResult(result)"
      >
        <div class="search-result-item">
          <mat-icon *ngIf="result.childIds.length > 0">folder</mat-icon>
          <mat-icon *ngIf="result.childIds.length === 0">description</mat-icon>
          <span>{{ result.name }}</span>
        </div>
      </a>
    </mat-nav-list>
  </div>

  <!-- Content navigation -->
  <div class="content-container" *ngIf="!searchQuery">
    <div class="table-container">
      <mat-list>
        <mat-list-item
          *ngFor="let entry of openLayers[openLayers.length - 1].nodes; let i = index"
          [ngClass]="{
            'selected-item': entry.databaseId == currentNodeId,
            'back-item': i === 0 && !openLayers[openLayers.length - 1].isRoot,
          }"
          (click)="onTableRowClick(entry, i, openLayers[openLayers.length - 1].isRoot)"
        >
          <div
            *ngIf="i === 0 && !openLayers[openLayers.length - 1].isRoot"
            class="list-item-content back-button"
          >
            <mat-icon>arrow_back</mat-icon>
            <span>Zurück zu {{ entry.name }}</span>
          </div>

          <div
            *ngIf="i !== 0 || openLayers[openLayers.length - 1].isRoot"
            class="list-item-content"
          >
            <div class="icon-container">
              <mat-icon *ngIf="entry.childIds.length > 0">folder</mat-icon>
              <mat-icon *ngIf="entry.childIds.length === 0">description</mat-icon>
            </div>
            <span>{{ entry.name }}</span>
            <mat-icon *ngIf="entry.childIds.length > 0" class="chevron-icon"
              >chevron_right</mat-icon
            >
          </div>
        </mat-list-item>
      </mat-list>
    </div>
  </div>
</div>

<div class="loading-container" *ngIf="!loadingDone">
  <mat-spinner diameter="50"></mat-spinner>
  <p>Lade Konzeptdaten...</p>
</div>
