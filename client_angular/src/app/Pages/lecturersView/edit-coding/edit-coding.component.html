<div class="edit-coding-container">
  <h2>Edit Coding Question</h2>
  <form [formGroup]="codingForm" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Programming Language</mat-label>
        <input matInput formControlName="programmingLanguage" required>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="form-field full-width">
      <mat-label>Question Text</mat-label>
      <textarea matInput formControlName="text" rows="10" required></textarea>
    </mat-form-field>

    <div formArrayName="codeGerueste">
      <h3>Code Templates</h3>
      <mat-accordion>
        <mat-expansion-panel *ngFor="let codeGeruest of codeGeruesteControls; let i = index" [formGroupName]="i">
          <mat-expansion-panel-header>
            <mat-panel-title>
              {{codeGeruest.get('codeFileName')?.value}}
            </mat-panel-title>
          </mat-expansion-panel-header>
          <mat-form-field appearance="outline" class="form-field full-width">
            <mat-label>Code</mat-label>
            <textarea matInput formControlName="code" rows="10"></textarea>
          </mat-form-field>
        </mat-expansion-panel>
      </mat-accordion>
    </div>

    <div formArrayName="automatedTests">
      <h3>Automated Tests</h3>
      <mat-accordion>
        <mat-expansion-panel *ngFor="let test of automatedTestsControls; let i = index" [formGroupName]="i">
          <mat-expansion-panel-header>
            <mat-panel-title>
              {{test.get('testFileName')?.value}}
            </mat-panel-title>
          </mat-expansion-panel-header>
          <mat-form-field appearance="outline" class="form-field full-width">
            <mat-label>Test Code</mat-label>
            <textarea matInput formControlName="code" rows="10"></textarea>
          </mat-form-field>
        </mat-expansion-panel>
      </mat-accordion>
    </div>

    <div class="form-actions">
      <button mat-raised-button color="primary" type="submit">Save Changes</button>
    </div>
  </form>
</div>
