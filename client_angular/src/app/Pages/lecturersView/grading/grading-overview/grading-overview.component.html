<div class="grading-overview-container">
  <div *ngIf="isLoading" class="loading-indicator">
    <p>Loading...</p>
  </div>

  <div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
  </div>

  <div *ngIf="question">
    <app-grading-upload *ngIf="question.type === questionType.UPLOAD" [questionId]="question.id"></app-grading-upload>
    <!-- Add other grading components here based on question.type -->
  </div>
</div>
