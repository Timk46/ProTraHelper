<div class="container-fluid user-grouping-page">
  <div class="action-bar">
    <button class="btn btn-primary" (click)="saveChanges()" [disabled]="!hasChanges()">Änderungen speichern</button>
    <button class="btn btn-secondary" (click)="discardChanges()" [disabled]="!hasChanges()">Änderungen verwerfen</button>
  </div>

  <div class="row mt-3">
    <!-- Unassigned Users Column -->
    <div class="col-md-4">
      <div class="card">
        <div class="card-header">
          <h4>Nicht zugewiesene Benutzer</h4>
        </div>
        <div class="card-body user-list-container"
             cdkDropList
             #unassignedList="cdkDropList"
             [cdkDropListData]="unassignedUsers"
             [cdkDropListConnectedTo]="groupDropLists ? groupDropLists.toArray() : []"
             (cdkDropListDropped)="drop($event)">
          <div class="user-box" *ngFor="let user of unassignedUsers" cdkDrag>
            {{ user.firstname }} {{ user.lastname }}
          </div>
          <div *ngIf="unassignedUsers.length === 0" class="text-muted p-3">
            Alle Benutzer sind einer Gruppe zugewiesen.
          </div>
        </div>
      </div>
    </div>

    <!-- Groups Column -->
    <div class="col-md-8">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h4>Gruppen</h4>
          <div class="group-actions">
            <button class="btn btn-sm btn-success me-2" (click)="openCreateGroupDialog()">Gruppe erstellen</button>
            <div class="d-inline-block">
              <div class="input-group input-group-sm">
                <input type="number" class="form-control" placeholder="Größe" [(ngModel)]="autoGroupSize" min="1">
                <button class="btn btn-sm btn-secondary" (click)="autoAssignGroups()" [disabled]="!autoGroupSize || unassignedUsers.length === 0">Automatisch aufteilen</button>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body groups-container" cdkDropListGroup>
          <div *ngFor="let group of groups; let i = index" class="group-container mb-3">
            <div class="group-header d-flex justify-content-between align-items-center">
              <h5>
                {{ group.name }}
                <span class="badge bg-secondary ms-2">{{ group.members.length }} / {{ group.maxSize }}</span>
              </h5>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteGroup(group.id)">
                <i class="fas fa-trash"></i>
              </button>
            </div>
            <div class="user-list-container"
                 cdkDropList
                 #groupList="cdkDropList"
                 [cdkDropListData]="group.members"
                 [cdkDropListConnectedTo]="getConnectedListsForGroup(groupList)"
                 (cdkDropListDropped)="drop($event)">
              <div class="user-box" *ngFor="let member of group.members" cdkDrag>
                {{ member.firstname }} {{ member.lastname }}
              </div>
              <div *ngIf="group.members.length === 0" class="text-muted p-3">
                Diese Gruppe ist leer.
              </div>
            </div>
          </div>
          <div *ngIf="groups.length === 0" class="text-muted p-3">
            Es wurden noch keine Gruppen erstellt.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
