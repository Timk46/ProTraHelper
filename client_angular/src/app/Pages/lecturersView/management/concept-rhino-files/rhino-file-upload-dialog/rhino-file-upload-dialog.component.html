<h2 mat-dialog-title>Rhino-Datei hochladen für {{ data.conceptNode.name }}</h2>

<mat-dialog-content>
  <div
    class="drop-zone"
    [class.drag-over]="dragOver"
    [class.disabled]="isUploading"
    (drop)="onDrop($event)"
    (dragover)="onDragOver($event)"
    (dragleave)="dragOver = false"
  >
    <ng-container *ngIf="!selectedFile; else fileSelected">
      <mat-icon class="upload-icon">cloud_upload</mat-icon>
      <p class="drop-text">Grasshopper-Datei (.gh) hier ablegen</p>
      <p class="or-text">oder</p>
      <input
        type="file"
        #fileInput
        accept=".gh"
        (change)="onFileSelected($event)"
        aria-label="Grasshopper-Datei auswählen"
        hidden
      />
      <button
        mat-raised-button
        color="primary"
        (click)="fileInput.click()"
        [disabled]="isUploading"
      >
        <mat-icon>folder_open</mat-icon>
        Datei auswählen
      </button>
      <p class="hint-text">Maximal 50 MB</p>
    </ng-container>

    <ng-template #fileSelected>
      <mat-icon class="success-icon" color="primary">check_circle</mat-icon>
      <p class="file-name">{{ selectedFile!.name }}</p>
      <p class="file-size">{{ (selectedFile!.size / 1024 / 1024).toFixed(2) }} MB</p>
      <button mat-button color="accent" (click)="selectedFile = null" [disabled]="isUploading">
        <mat-icon>refresh</mat-icon>
        Andere Datei wählen
      </button>
    </ng-template>
  </div>

  <!-- Upload Progress -->
  <mat-progress-bar
    *ngIf="isUploading"
    mode="indeterminate"
    color="accent"
    class="upload-progress"
  ></mat-progress-bar>

  <p *ngIf="isUploading" class="uploading-text">Datei wird hochgeladen...</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="isUploading">Abbrechen</button>
  <button
    mat-raised-button
    color="primary"
    (click)="onUpload()"
    [disabled]="!selectedFile || isUploading"
  >
    <mat-icon *ngIf="!isUploading">upload</mat-icon>
    <mat-icon *ngIf="isUploading">hourglass_empty</mat-icon>
    {{ isUploading ? 'Wird hochgeladen...' : 'Hochladen' }}
  </button>
</mat-dialog-actions>
