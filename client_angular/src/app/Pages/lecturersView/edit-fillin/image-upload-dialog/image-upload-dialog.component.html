<div class="dialog-wrapper">
  <h2 mat-dialog-title>Insert/Edit Image</h2>
  <div class="dialog-content">
    <div class="tabs">
      <div class="tab" [class.active]="activeTab === 'general'" (click)="switchTab('general')">General</div>
      <div class="tab" [class.active]="activeTab === 'upload'" (click)="switchTab('upload')">Upload</div>
    </div>
    <div class="content">
      <div *ngIf="activeTab === 'general'">
        <div class="form-group">
          <label for="altDescription">Alternative description</label>
          <input type="text" id="altDescription" [(ngModel)]="altDescription">
        </div>
      </div>
      <div *ngIf="activeTab === 'upload'" class="drop-zone" (drop)="onFileDrop($event)" (dragover)="onDragOver($event)">
        <ng-container *ngIf="!imagePreviewUrl; else previewTemplate">
          <p>Hier Bild einfügen</p>
          <input type="file" (change)="onFileSelected($event)" accept="image/*" class="file-input">
        </ng-container>
        <ng-template #previewTemplate>
          <img [src]="imagePreviewUrl" alt="Preview" style="max-width: 100%; max-height: 200px;">
        </ng-template>
      </div>
      <div class="form-row">
        <div class="form-group half-width">
          <label for="width">Width</label>
            <input type="text" id="width" [(ngModel)]="imageWidth">
          </div>
          <div class="form-group half-width">
            <label for="height">Height</label>
            <input type="text" id="height" [(ngModel)]="imageHeight">
        </div>
      </div>
    </div>
  </div>
  <div class="dialog-actions">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSave()" [disabled]="!canSave()">Save</button>
  </div>
</div>
