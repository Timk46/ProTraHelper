<div class="content-container" class="mat-elevation-z8">
<table [dataSource]="dataSource" mat-table>
  <!-- Position Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>

  <!-- Weight Column -->
  <ng-container matColumnDef="progress">
    <th mat-header-cell *matHeaderCellDef> Fortschritt </th>
    <td mat-cell *matCellDef="let row">
      <mat-progress-spinner [value]="row.progress" [mode]="'determinate'" [diameter]="30"></mat-progress-spinner>
    </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="question">
    <th mat-header-cell *matHeaderCellDef> Fragen </th>
    <td mat-cell *matCellDef="let element"> {{element.question}} </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Aktion </th>
    <td mat-cell *matCellDef="let element"> 
      <button mat-raised-button color="primary" (click)="onContentClick(element.action)" class="button">Öffnen</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
</div>
