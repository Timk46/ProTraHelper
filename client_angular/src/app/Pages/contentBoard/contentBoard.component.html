    <div class="grid-container">
      <mat-card class="card-container" *ngFor="let content of contentsForActiveConceptNode.trainedBy" (click)="onContentClick(content)">
        <mat-card-header>
          <mat-card-title>{{ content.name }}</mat-card-title>
          <mat-card-subtitle>ContentNode Id: {{ content.contentNodeId }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          ContentNode Description: {{ content.description }}
        </mat-card-content>
      </mat-card>
    </div>
