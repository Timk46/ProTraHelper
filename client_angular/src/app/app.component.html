<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side" [class.mat-elevation-z4]="true" class="app-sidenav">
    <mat-nav-list>
      <!--<a mat-list-item routerLink="tutor-kai/code/3" routerLinkActive="active-link">Tutor-Kai Test</a>-->
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
      <a mat-list-item routerLink="/discussion" routerLinkActive="active-link">Discussion</a>
      <!--<a mat-list-item routerLink="/codeTask" routerLinkActive="active-link">Code Task</a>-->
      <!--<a mat-list-item routerLink="/mcTask" routerLinkActive="active-link">MC Task</a>-->
      <a mat-list-item routerLink="/mcqcreation" routerLinkActive="active-link">MCQ Creation</a>
      <a mat-list-item routerLink="/task-evaluation-overview" routerLinkActive="active-link">Task Evaluation Overview</a>
      <a mat-list-item routerLink="/file-upload" routerLinkActive="active-link">file-upload</a>
      <!--<a mat-list-item routerLink="/chatbot" routerLinkActive="active-link">Chat Bot</a>-->
      <a mat-list-item *ngIf="userIsLoggedIn" (click)="logOut()">Logout</a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
       <app-chat-bot *ngIf="(toolbarService.visible|async)"></app-chat-bot>
      <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
<div *ngIf="userIsLoggedIn">
  <app-notification-bell></app-notification-bell>
</div>

<mat-toolbar class="footer">
  <!-- Dashboard-Link auf der linken Seite -->
  <div class="left-content">
      <button  style="font-size:15px;cursor: pointer;">Version: {{version}}</button>
      <mat-divider vertical="true" class="divider"></mat-divider>
      <button mat-button style="font-size:15px;">User: {{userMail? userMail : "nicht eingeloggt"}} </button>
  </div>

  <!-- Zentrierte Inhalte für Impressum, Datenschutz und Hilfe -->
  <div class="center-content">
    <button mat-button (click)="openImpressum()">Impressum</button>
    <mat-divider vertical="true" class="divider"></mat-divider>
    <button mat-button (click)="openContact()">Hilfe</button>
    <mat-divider vertical="true" class="divider"></mat-divider>
    <button mat-button (click)="openDatenschutz()">Datenschutz</button>
  </div>

  <!-- User-Information auf der rechten Seite -->
  <div class="right-content">
    <mat-slide-toggle *ngIf="userRole === 'ADMIN'" (change)="onToggleEditorMode()" [checked]="editModeActive" color="primary" style="margin-right: 10px;">
      Edit Mode
    </mat-slide-toggle>
    <mat-divider vertical="true" class="divider" *ngIf="userIsLoggedIn"></mat-divider>
    <button mat-button *ngIf="userRole === 'ADMIN'" routerLink="/admin" style="font-size:15px; font-weight:bolder;">Admin Panel</button>
    <mat-divider vertical="true" class="divider" *ngIf="userIsLoggedIn"></mat-divider>
    <button mat-button *ngIf="userIsLoggedIn" style="font-size:15px; font-weight:bolder;" (click)="showProgress()"> Fortschritt anzeigen </button>
    <mat-divider *ngIf="userRole === 'ADMIN'" vertical="true" class="divider"></mat-divider>
    <button mat-button style="margin-left: 5px" *ngIf="userIsLoggedIn" (click)="logOut()">Logout</button>
  </div>
    <!-- NOTIFICATION BELL
      <app-notification-bell class="bell"></app-notification-bell>
    -->
</mat-toolbar>
