<mat-toolbar style="min-height: 30px !important; height: 30px !important;" color="primary" *ngIf="(toolbarService.visible|async)">
  <!--<button mat-icon-button (click)="sidenav.toggle()" matTooltip="Menu">
      <mat-icon>menu</mat-icon>
  </button>-->
  <a mat-list-item routerLink="/dashboard" style="cursor: pointer;" routerLinkActive="active-link">
    <span style="font-size:15px;">Dashboard</span>
  </a>
  <span class="toolbar-item-spacer"></span>
  <span style="font-size:15px;" *ngIf="userIsLoggedIn">User: {{userMail}} | </span>

  <span style="font-size:15px; margin-left: 5px; cursor: pointer;" *ngIf="userIsLoggedIn" (click)="logOut()">Logout</span>
  <!--<button *ngIf="userIsLoggedIn" mat-icon-button matTooltip="Mein Account">
      <mat-icon>account_circle</mat-icon
  </button>-->
</mat-toolbar>

<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side" [class.mat-elevation-z4]="true" class="app-sidenav">
    <mat-nav-list>
      <!--<a mat-list-item routerLink="tutor-kai/code/3" routerLinkActive="active-link">Tutor-Kai Test</a>-->
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
      <a mat-list-item routerLink="/discussion" routerLinkActive="active-link">Discussion</a>
      <!--<a mat-list-item routerLink="/codeTask" routerLinkActive="active-link">Code Task</a>-->
      <!--<a mat-list-item routerLink="/mcTask" routerLinkActive="active-link">MC Task</a>-->
      <a mat-list-item routerLink="/mcqcreation" routerLinkActive="active-link">MCQ Creation</a>
      <a mat-list-item routerLink="/task-evaluation-overview" routerLinkActive="active-link">Task Evaluation Overview</a>
      <a mat-list-item routerLink="/file-upload" routerLinkActive="active-link">file-upload</a>
      <!--<a mat-list-item routerLink="/chatbot" routerLinkActive="active-link">Chat Bot</a>-->
      <a mat-list-item *ngIf="userIsLoggedIn" (click)="logOut()">Logout</a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
       <!--<app-chat-bot *ngIf="(toolbarService.visible|async)"></app-chat-bot>!-->
      <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
