<mat-sidenav-container class="sidenav-container">
  <mat-sidenav class="sidenav" mode="side" opened>
    <mat-nav-list>
      <a mat-list-item routerLink="/home" routerLinkActive="active-link">Home</a>
      <a mat-list-item routerLink="/content" routerLinkActive="active-link">Content</a>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
      <a mat-list-item routerLink="/contentOverview" routerLinkActive="active-link">Content Overview</a>
      <a mat-list-item routerLink="/discussion" routerLinkActive="active-link">Discussion</a>
      <a mat-list-item routerLink="/codeTask" routerLinkActive="active-link">Code Task</a>
      <a mat-list-item routerLink="/instruction" routerLinkActive="active-link">Instruction</a>
      <a mat-list-item routerLink="/mcQuiz" routerLinkActive="active-link">MC Quiz</a>
      <a mat-list-item routerLink="/graph" routerLinkActive="active-link">Graph</a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>

<mat-toolbar color="primary">
  <button mat-icon-button (click)="sidenav.toggle()" matTooltip="Menu">
      <mat-icon>menu</mat-icon>
  </button>
  <span>HEFL</span>
  <span class="toolbar-item-spacer"></span>
  <button mat-icon-button matTooltip="Mein Account">
      <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side" [class.mat-elevation-z4]="true" class="app-sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/content" routerLinkActive="active-link">Content</a>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
      <a mat-list-item routerLink="/contentOverview" routerLinkActive="active-link">Content Overview</a>
      <a mat-list-item routerLink="/discussion" routerLinkActive="active-link">Discussion</a>
      <a mat-list-item routerLink="/codeTask" routerLinkActive="active-link">Code Task</a>
      <a mat-list-item routerLink="/instruction" routerLinkActive="active-link">Instruction</a>
      <a mat-list-item routerLink="/mcQuiz" routerLinkActive="active-link">MC Quiz</a>
      <a mat-list-item routerLink="/graph" routerLinkActive="active-link">Graph</a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
      <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
